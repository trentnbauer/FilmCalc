services:
  app:
    image: ghcr.io/trentnbauer/filmcalc:latest
    ports:
      - ${WEBPORT:-8080}:80
    volumes:
      # Only config.yaml lives in the named volume — mounting the whole
      # html directory here would shadow index.html and the other files
      # baked into the image with an empty volume on first run.
      - config:/usr/share/nginx/html/config.yaml
    restart: unless-stopped
    labels:
      - filmcalcheal=true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=filmcalcheal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  data:
