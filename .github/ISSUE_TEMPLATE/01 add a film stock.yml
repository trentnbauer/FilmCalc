name: "🎞️ Add a film stock"
description: Request a new film stock be added to the presets
title: "[Add Film] "
labels: ["data", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Presets aim to cover **mainstream, readily available** stocks. Rare, limited-run, novelty, or
        frequently-out-of-stock films are generally left out on purpose — you can always add them
        yourself in the Library tab without them shipping as a preset.

        Once submitted, an automated check reads this form (including any screenshot) and opens a
        pull request for a maintainer to review — you don't need to write any YAML yourself. If
        anything's unclear it'll leave a comment on this issue asking you to clarify instead.

        Adding a lab instead? Use the **Add a lab** template — this one's film stocks only.

  - type: input
    id: name
    attributes:
      label: Name
      placeholder: "e.g. Kodak Portra 400 (120)"
    validations:
      required: true

  - type: input
    id: country
    attributes:
      label: Country
      description: Films are grouped by country — this decides which folder the entry belongs in.
      placeholder: "e.g. Australia"
    validations:
      required: true

  - type: dropdown
    id: availability
    attributes:
      label: Availability
      description: |
        Could someone ANYWHERE in the country walk into a store and get this exact price with zero
        shipping cost — like Woolworths or JB Hi-Fi? If so, pick Country-wide. If it's an online-only
        or single-location shop that charges buyers outside its own city/region for postage on top of
        this price — even if it technically ships nationwide, e.g. a Melbourne-based online film shop —
        pick State or City instead. "Ships nationally" is NOT the test; "no postage anywhere in the
        country" is.
      options:
        - Country-wide (walk-in price, no postage anywhere)
        - State/region-wide only
        - City-only (mail order/local pickup — postage applies elsewhere)
    validations:
      required: true

  - type: input
    id: state
    attributes:
      label: State / region
      description: Required if you picked "State/region-wide only" or "City-only" above.
      placeholder: "e.g. Victoria"
    validations:
      required: false

  - type: input
    id: city
    attributes:
      label: City
      description: Required if you picked "City-only" above.
      placeholder: "e.g. Melbourne"
    validations:
      required: false

  - type: textarea
    id: film-details
    attributes:
      label: Film details
      value: |
        - Format (35mm / 120 / 110 / …):
        - Box speed (ISO):
        - Process (C41 / BW / E6 / ECN-2):
        - Exposures per roll:
        - Push/pull limit in stops (maxPushPull):
        - Regular price (not sale price):
        - Where to buy (link):
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: Source link
      description: The retailer page with current pricing.
      placeholder: "https://…"
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot (optional but helpful)
      description: |
        A screenshot of the pricing page preserves what you saw, since prices and stock change.
        Drag an image into this box to upload it.
      placeholder: Paste or drag your screenshot here.
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmations
      options:
        - label: This is a mainstream stock that's reliably available (not a rare or limited run)
        - label: The price given is the **regular** price, not a sale price
