name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  # One review per PR: a new push should replace the in-flight review of the
  # commit it superseded, not queue up alongside it.
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for non-data changes
        # claude-review is a required status check, so it must trigger and
        # report a status on every PR — a paths-ignore: filter on `on:`
        # would make GitHub skip queuing the run entirely for data-only PRs
        # (films/**, labs/**), which leaves the required check permanently
        # pending and blocks merging (see #128 for the same issue with
        # dev-cost-calc-tests). Instead the job always runs, and skips the
        # actual review step internally when every changed file is data —
        # claude-sanity-check in validate data.yml covers those instead, so
        # a full code review would just double the Claude call for nothing.
        id: filter
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -qvE '^(films/|labs/)'; then
            echo "non_data=true" >> "$GITHUB_OUTPUT"
          else
            echo "non_data=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code Review
        id: claude-review
        if: steps.filter.outputs.non_data == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # daily-claude-run.yml opens PRs as claude[bot] -- without this,
          # the action refuses to run on its own PRs ("Workflow initiated by
          # non-human actor"). Allow-listing just this one bot rather than
          # '*', since this is a public repo and '*' would let any bot
          # (including an external contributor's) trigger the action.
          allowed_bots: "claude[bot]"
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

