name: Daily Claude Run

# Runs at 1am AEST (UTC+10, fixed year-round) every day. GitHub Actions
# cron has no timezone support, so this is pinned to 15:00 UTC — in
# Sydney/Melbourne that's 1am AEST but 2am AEDT during daylight saving
# (Oct-Apr).
#
# Three tiers, processed in order (see the prompt below for the exact
# rules). Scope is deliberately narrow: data corrections, calculation
# bugs, bug reports, security hardening, and code-scanning alerts --
# feature requests and anything else get left alone for a human to
# triage.
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

concurrency:
  # Prevent a manual run from overlapping with the scheduled one (or two
  # manual runs from overlapping each other).
  group: daily-claude-run
  cancel-in-progress: false

jobs:
  daily-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure tracking label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "claude-attempted" \
            --repo ${{ github.repository }} \
            --color "5319e7" \
            --description "Claude already handled this issue (PR opened, or skipped as too ambiguous). Remove to retry." \
            --force

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          additional_permissions: |
            actions: read
          claude_args: '--allowed-tools "Bash(gh:*),Bash(git:*),Bash(node:*),Bash(python3:*),Read,Edit,Write,Grep,Glob"'
          prompt: |
            You are running as a scheduled, unattended job with no human present. Be conservative:
            implement real, working fixes, and do not refactor or "improve" unrelated code. This run
            only handles data corrections, calculation bugs, bug reports, security hardening, and
            code-scanning alerts — never feature requests, and never any other open issue that isn't
            clearly one of those. Never push to main directly, and never approve your own PR (GitHub
            blocks self-approval anyway).

            Work through these three tiers, strictly in order. Fully finish every item in a tier
            (PR opened/merged, or skipped with a comment/note, plus tracking applied) before starting
            the next item, and don't begin a lower tier while any higher tier still has unprocessed
            items:

            ---

            ## The auto-merge confidence bar

            Several tiers below let you merge a PR yourself instead of leaving it for human review.
            Only do that when ALL of these hold — this is a high bar, deliberately:
              - it's a well-understood, standard fix (not a judgment call between several valid
                approaches, not a design/infra tradeoff);
              - the diff is minimal and localized — it touches only what's needed, nothing else;
              - you verified it end-to-end yourself: reproduced the original bug/vulnerability, ran the
                relevant tests (`node --test tests/`) or otherwise exercised the changed code path, and
                confirmed the fix actually resolves it with no regressions;
              - for changes to `index.html`, you've confirmed the file is still well-formed (e.g. parse
                it with Python's `html.parser.HTMLParser` and confirm no errors); for changes to a
                `.github/workflows/*.yml` file, confirmed it's still valid YAML.
            If any of those don't hold, leave the PR open for human review instead. Say explicitly in
            the PR body whether you merged it and why (or why not).

            ---

            **Tier 1 — Code-scanning alerts (Security tab)**

            List this repo's open code scanning alerts, most severe first:
            ```
            gh api repos/${{ github.repository }}/code-scanning/alerts --paginate \
              -q '.[] | select(.state=="open")'
            ```
            An alert with no `security_severity_level` (i.e. `.rule.severity` of `error`/`warning`/
            `note` instead) is treated as low severity if `error`, and skipped entirely if `warning` or
            `note` — those are lint-style findings, not worth a standalone PR.

            Before starting work on an alert, check whether a PR already exists for it
            (`gh pr list --state open --search "<rule-id> in:title"` or similar) and skip if so.

            For each remaining alert, most severe first:
            1. Create a branch named `security-<rule-id>-<alert-number>-YYYY-MM-DD` (today's date) off
               main, and push it so it exists on the remote.
            2. Try GitHub Copilot Autofix first:
               `gh api repos/${{ github.repository }}/code-scanning/alerts/<alert-number>/autofix` to
               check for an existing suggestion (POST the same path first if none exists yet, then poll
               GET a few times if its `status` isn't `success` yet). If it reaches `status: success`,
               commit it to your branch:
               `gh api -X POST repos/${{ github.repository }}/code-scanning/alerts/<alert-number>/autofix/commits -f target_ref="refs/heads/<branch>"`,
               then `git pull` that branch locally.
            3. Whether or not Autofix produced something, pull the SARIF for the most recent analysis
               (`gh api -H "Accept: application/sarif+json" repos/${{ github.repository }}/code-scanning/analyses/<id>`)
               and trace the codeFlows to the actual tainted source feeding the sink. Read the patched
               file(s) end-to-end and judge Copilot's patch (if any) against that root cause:
                 - If it genuinely closes the hole, is minimal, and doesn't change unrelated behavior:
                   keep it as-is.
                 - If it's incomplete, wrong, or overreaching: replace it with your own fix on the same
                   branch (additional commit). Say in the PR description that you adjusted or replaced
                   Copilot's suggestion and why.
                 - If it looks like a false positive (already-sanitized data the tool can't trace
                   through a custom helper): don't open a PR — delete the branch and move on, no PR, no
                   comment needed for a code-scanning alert.
                 - If Autofix never produced a usable suggestion after a couple of retries: implement
                   the fix yourself from the SARIF trace, same as if there were no Autofix.
            4. Open a PR: title stating the alert (rule id + file/line + severity), body with the root
               cause, the fix, whether it came from Copilot or you (and why, if you changed it), and how
               you verified it.
            5. Apply the auto-merge confidence bar above. If it holds, merge it yourself
               (`gh pr merge --squash --auto --delete-branch`); if not, leave it open.

            **Tier 2 — Film/lab data + wrong-calculation issues (always PR + auto-merge)**

            List open issues authored by ${{ github.repository_owner }}:
            ```
            gh issue list --repo ${{ github.repository }} --author ${{ github.repository_owner }} \
              --state open --json number,title,body,labels,createdAt,author --jq 'sort_by(.createdAt)'
            ```
            From these, take every open issue labelled `data` (add/correct a film or lab — the "Add a
            film stock", "Add a lab", and "Incorrect film or lab data" templates all use this label,
            even though the first two also carry `enhancement` — that `enhancement` co-label doesn't
            apply here) or `calculation` ("Wrong calculation" reports). Skip any already labelled
            `claude-attempted`.

            For each: read it fully, reproduce the described behavior/gap against current code and
            data files, implement the fix (new/corrected film or lab entry, or the calculation
            correction), verify it (run `node --test tests/` for calculation changes; sanity-check new
            YAML/data entries against `DATA_SPEC.md` conventions), commit, push, and open a PR with
            `Fixes #<number>` and a test-plan checklist showing how you verified it.

            These always get merged by you once opened — `gh pr merge --squash --auto --delete-branch`
            — no confidence gate. They're mechanical, low-risk, additive changes; that's the whole point
            of this tier. If you genuinely can't tell what the correct film/lab data or calculation
            should be (conflicting info, missing a value with no reasonable source), don't guess — leave
            it unimplemented, comment on the issue explaining what's missing and @-mentioning
            `author.login`, and still label it `claude-attempted`.

            **Tier 3 — Bug reports + security hardening (PR, auto-merge only if very confident)**

            From the same issue listing: take every remaining open issue (not already claimed by Tier 2)
            labelled `bug` or `security`, skipping any already labelled `claude-attempted`. Ignore
            everything else (feature requests, anything unlabelled or off-topic).

            One carve-out: if an issue's title/body describes an actual exploitable vulnerability (a
            real exploit, data leak, injection — not just a hardening suggestion or "this looks unsafe"),
            treat it as PR-only, never auto-merge, regardless of how confident you are — a reported
            vulnerability needs a human to confirm the report and the fix actually match. Everything else
            in this tier follows the normal confidence bar below.

            For each issue: read it fully, then try to replicate the reported behavior before deciding
            anything else — follow the reporter's repro steps against the current code (read the
            relevant code path end-to-end, and actually exercise it where feasible: run the
            calculation/script, parse the YAML, load the page logic). Keep track of what you did and
            observed — you'll need it either way.

            Decide whether it's implementable with reasonable confidence in what "done" looks like — the
            same judgment call you'd make if a human asked you to "just implement this issue" with no
            other context. If you couldn't replicate it, or it's too vague, too large for one PR, or
            hinges on a decision only the repo owner can make, don't implement it — comment on the issue
            explaining what you tried and what's unclear, @-mentioning `author.login`, and label it
            `claude-attempted`.

            If you can implement it: create a branch named `claude/issue-<number>-<short-slug>`,
            implement the change matching existing conventions, verify it actually works, commit, push,
            and open a PR with `Fixes #<number>` and a test-plan checklist covering how you replicated
            the original issue and confirmed your fix. Then apply the auto-merge confidence bar above
            (minus the vulnerability carve-out noted higher up): if it holds, merge it yourself; if not,
            leave it open for review. Either way, label the issue `claude-attempted`.

            ---

            If a tier has nothing to do, move on to the next one silently. If every tier is empty, do
            nothing at all — no branches, no PRs, no comments.
