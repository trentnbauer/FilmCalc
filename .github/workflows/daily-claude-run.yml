name: Daily Claude Run

# Runs at 1am AEST (UTC+10, fixed year-round) every day. GitHub Actions
# cron has no timezone support, so this is pinned to 15:00 UTC — in
# Sydney/Melbourne that's 1am AEST but 2am AEDT during daylight saving
# (Oct-Apr).
#
# Four tiers, processed in order (see the prompt below for the exact
# rules). Scope is deliberately narrow: data corrections, calculation
# bugs, bug reports, security hardening, code-scanning alerts, and (last,
# lowest priority) new-language translation requests -- feature requests
# and anything else get left alone for a human to triage.
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

concurrency:
  # Prevent a manual run from overlapping with the scheduled one (or two
  # manual runs from overlapping each other).
  group: daily-claude-run
  cancel-in-progress: false

jobs:
  daily-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure tracking label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "claude-attempted" \
            --repo ${{ github.repository }} \
            --color "5319e7" \
            --description "Claude already handled this issue (PR opened, or skipped as too ambiguous). Remove to retry." \
            --force

      - name: Prepare Tier 1 security-alert data
        # The Claude GitHub App's own installation token has no
        # security_events access at all -- requesting it via
        # additional_permissions hard-fails the App's token exchange rather
        # than just being denied per-call. This step does all the
        # security-events-scoped API work up front with GITHUB_TOKEN (which
        # does have it, from this job's `permissions:` above) and hands
        # Claude a plain manifest + SARIF files to read instead.
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/prepare-security-alerts.sh

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: '--allowed-tools "Bash(gh:*),Bash(git:*),Bash(node:*),Bash(python3:*),Read,Edit,Write,Grep,Glob"'
          prompt: |
            You are running as a scheduled, unattended job with no human present. Be conservative:
            implement real, working fixes, and do not refactor or "improve" unrelated code. This run
            only handles data corrections, calculation bugs, bug reports, security hardening,
            code-scanning alerts, and new-language translation requests — never feature requests, and
            never any other open issue that isn't clearly one of those. Never push to main directly,
            and never approve your own PR (GitHub blocks self-approval anyway).

            Work through these four tiers, strictly in order. Fully finish every item in a tier
            (PR opened/merged, or skipped with a comment/note, plus tracking applied) before starting
            the next item, and don't begin a lower tier while any higher tier still has unprocessed
            items:

            ---

            ## The auto-merge confidence bar

            Several tiers below let you merge a PR yourself instead of leaving it for human review.
            Only do that when ALL of these hold — this is a high bar, deliberately:
              - it's a well-understood, standard fix (not a judgment call between several valid
                approaches, not a design/infra tradeoff);
              - the diff is minimal and localized — it touches only what's needed, nothing else;
              - you verified it end-to-end yourself: reproduced the original bug/vulnerability, ran the
                relevant tests (`node --test tests/`) or otherwise exercised the changed code path, and
                confirmed the fix actually resolves it with no regressions;
              - for changes to `index.html`, you've confirmed the file is still well-formed (e.g. parse
                it with Python's `html.parser.HTMLParser` and confirm no errors); for changes to a
                `.github/workflows/*.yml` file, confirmed it's still valid YAML.
            If any of those don't hold, leave the PR open for human review instead. Say explicitly in
            the PR body whether you merged it and why (or why not).

            ---

            **Tier 1 — Code-scanning alerts (Security tab)**

            Your own token has no access to the code-scanning API (a separate step already checked, so
            don't bother retrying `gh api .../code-scanning/...` yourself — it will just 403). Instead,
            read `${{ runner.temp }}/security-alerts/manifest.json`, a pre-built array (most severe
            first) with one entry per open, actionable alert that doesn't already have a PR:
            ```
            {
              "number": <alert number>,
              "rule_id": "<rule id>",
              "severity": "critical" | "high" | "medium" | "low",
              "branch": "<branch name, already pushed if autofix_status is \"committed\">",
              "autofix_status": "committed" | "commit_failed" | "unavailable",
              "autofix_description": "<Copilot's own explanation of its fix, if committed>",
              "sarif_file": "<path to that alert's SARIF, or empty string if none was found>"
            }
            ```
            If the manifest is missing, empty, or is `[]`, there's nothing to do in this tier — move on
            to Tier 2.

            For each entry, most severe first:
            1. If `sarif_file` is non-empty, read it and trace the codeFlows to the actual tainted
               source feeding the sink — that's your root-cause reference for judging any fix, Copilot's
               or your own.
            2. Branch `<branch>` already exists on the remote either way (created by the prep step) —
               `git fetch origin <branch> && git checkout <branch>`.
               - If `autofix_status` is `"committed"`: the branch already has Copilot's proposed fix as
                 a commit. Read the changed file(s) end-to-end and judge that patch against the SARIF
                 root cause:
                   - Genuinely closes the hole, minimal, no unrelated behavior change → keep it as-is.
                   - Incomplete, wrong, or overreaching → replace it with your own fix (additional
                     commit on the same branch). Say in the PR description that you adjusted or replaced
                     Copilot's suggestion and why.
                   - Looks like a false positive (already-sanitized data the tool can't trace through a
                     custom helper, or input that isn't actually attacker-controllable) → don't open a
                     PR. `git push origin --delete <branch>`, then dismiss it — you can't call the
                     dismissal API yourself (same reason you can't list alerts), so instead append
                     `{"number": <alert number>, "comment": "<why, ≤280 chars, this becomes the
                     dismissal comment on the alert>"}` to
                     `${{ runner.temp }}/security-alerts/dismissals.json` (an array; create it as `[]`
                     first if it doesn't already exist). A step after you finish applies these for real —
                     without an entry here, the alert just stays open with nothing recorded, even though
                     you decided it was fine.
               - If `autofix_status` is `"commit_failed"` or `"unavailable"`: the branch exists but is
                 empty (still just main). Implement the fix yourself from the SARIF trace (or, if there
                 was no `sarif_file` either, from the alert's rule id and file location — read the
                 relevant code path end-to-end), then commit and push it to that same branch.
            3. Open a PR: title stating the alert (rule id + file/line + severity), body with the root
               cause, the fix, whether it came from Copilot or you (and why, if you changed it), and how
               you verified it.
            4. Apply the auto-merge confidence bar above. If it holds, merge it yourself
               (`gh pr merge --squash --auto --delete-branch`); if not, leave it open.

            **Tier 2 — Film/lab data + wrong-calculation issues (always PR + auto-merge)**

            List open issues authored by ${{ github.repository_owner }}:
            ```
            gh issue list --repo ${{ github.repository }} --author ${{ github.repository_owner }} \
              --state open --json number,title,body,labels,createdAt,author --jq 'sort_by(.createdAt)'
            ```
            From these, take every open issue labelled `data` (add/correct a film or lab — the "Add a
            film stock", "Add a lab", and "Incorrect film or lab data" templates all use this label,
            even though the first two also carry `enhancement` — that `enhancement` co-label doesn't
            apply here) or `calculation` ("Wrong calculation" reports). Skip any already labelled
            `claude-attempted`.

            For each: read it fully, reproduce the described behavior/gap against current code and
            data files, implement the fix (new/corrected film or lab entry, or the calculation
            correction), verify it (run `node --test tests/` for calculation changes; sanity-check new
            YAML/data entries against `DATA_SPEC.md` conventions), commit, push, and open a PR with
            `Fixes #<number>` and a test-plan checklist showing how you verified it.

            These always get merged by you once opened — `gh pr merge --squash --auto --delete-branch`
            — no confidence gate. They're mechanical, low-risk, additive changes; that's the whole point
            of this tier. If you genuinely can't tell what the correct film/lab data or calculation
            should be (conflicting info, missing a value with no reasonable source), don't guess — leave
            it unimplemented, comment on the issue explaining what's missing and @-mentioning
            `author.login`, and still label it `claude-attempted`.

            **Tier 3 — Bug reports + security hardening (PR, auto-merge only if very confident)**

            From the same issue listing: take every remaining open issue (not already claimed by Tier 2)
            labelled `bug` or `security`, skipping any already labelled `claude-attempted`. Ignore
            everything else (feature requests, anything unlabelled or off-topic).

            One carve-out: if an issue's title/body describes an actual exploitable vulnerability (a
            real exploit, data leak, injection — not just a hardening suggestion or "this looks unsafe"),
            treat it as PR-only, never auto-merge, regardless of how confident you are — a reported
            vulnerability needs a human to confirm the report and the fix actually match. Everything else
            in this tier follows the normal confidence bar below.

            For each issue: read it fully, then try to replicate the reported behavior before deciding
            anything else — follow the reporter's repro steps against the current code (read the
            relevant code path end-to-end, and actually exercise it where feasible: run the
            calculation/script, parse the YAML, load the page logic). Keep track of what you did and
            observed — you'll need it either way.

            Decide whether it's implementable with reasonable confidence in what "done" looks like — the
            same judgment call you'd make if a human asked you to "just implement this issue" with no
            other context. If you couldn't replicate it, or it's too vague, too large for one PR, or
            hinges on a decision only the repo owner can make, don't implement it — comment on the issue
            explaining what you tried and what's unclear, @-mentioning `author.login`, and label it
            `claude-attempted`.

            If you can implement it: create a branch named `claude/issue-<number>-<short-slug>`,
            implement the change matching existing conventions, verify it actually works, commit, push,
            and open a PR with `Fixes #<number>` and a test-plan checklist covering how you replicated
            the original issue and confirmed your fix. Then apply the auto-merge confidence bar above
            (minus the vulnerability carve-out noted higher up): if it holds, merge it yourself; if not,
            leave it open for review. Either way, label the issue `claude-attempted`.

            **Tier 4 — New-language translation requests (PR only, never auto-merge)**

            Only start this tier once Tiers 1-3 have nothing left unprocessed — it's the lowest
            priority, and the slowest per item. From the same issue listing: take every remaining open
            issue labelled `i18n` (the "Add a language" template), skipping any already labelled
            `claude-attempted`.

            For each: read the requested language name and ISO 639-1 code from the issue body. Check
            `js/i18n.js`'s `STRINGS` object for a top-level key matching that code — if it already
            exists, don't duplicate it; comment on the issue saying so, label it `claude-attempted`, and
            move on.

            Otherwise, translate the entire app:
            1. Read every key in `STRINGS.en` (currently ~470 keys) and write a matching
               `STRINGS.<code>` object translating every value — preserve every `{placeholder}` token
               verbatim (never translate the token name inside the braces), keep photography
               terminology consistent (push/pull, box speed, mail-back, hi-res scan, etc. — skim a
               couple of existing non-English locales for precedent), and do not add, drop, merge, or
               reorder keys relative to `en`.
            2. Add a `language<Name>` display-name key (e.g. `languageGerman: 'German'`) to **every**
               existing locale's `STRINGS` block, including the new one describing itself, and to `en`.
            3. In `index.html`, add an `<option>` for the new locale to both `#languageSelect`
               (Settings > Appearance) and `#languageWelcomeSelect` (the first-run welcome popup),
               matching the existing `<option>` pattern for `es`/`ja`.
            4. In `js/modals.js`, add an entry for the new code to `WELCOME_CONTINUE_LABELS` (the
               popup's "Continue" button label, translated).
            5. Run `node .github/scripts/verify-i18n-parity.js` — it must print `OK` with zero exit
               code before you go any further. Fix any key/placeholder mismatch it reports; don't open
               a PR with a failing verification.
            6. Run `node --check js/i18n.js` and `node --check js/modals.js`, and confirm `index.html`
               is still well-formed (same check as the auto-merge confidence bar above). Run
               `node --test tests/` too, even though it won't exercise i18n directly — it must still
               pass.

            Commit, push to a branch named `claude/issue-<number>-<lang-code>`, and open a PR with
            `Closes #<number>`, the verification output, and an explicit note that **translation
            accuracy has not been reviewed by a native or fluent speaker** and needs one before merge —
            unlike the other tiers, never auto-merge this one, regardless of how confident you are.
            Machine/AI translation of ~470 strings covering photography-specific terminology is exactly
            the kind of thing that reads fine to a non-speaker and is wrong to a native one; that
            judgment call belongs to a human every time. Label the issue `claude-attempted` either way.

            If translating in full genuinely isn't feasible (e.g. you can't confidently translate
            photography-specific terms into this language without risking nonsense), don't guess or do
            a partial job — comment on the issue explaining what's uncertain and @-mentioning
            `author.login`, and still label it `claude-attempted`.

            ---

            If a tier has nothing to do, move on to the next one silently. If every tier is empty, do
            nothing at all — no branches, no PRs, no comments.

      - name: Apply Tier 1 false-positive dismissals
        # Same reason as the prep step: Claude's own token can't call the
        # code-scanning API to actually dismiss an alert it judged a false
        # positive, so it wrote its verdict to dismissals.json instead. This
        # runs regardless of the Claude step's own outcome, so any
        # dismissals it did manage to record still get applied.
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/apply-security-dismissals.sh
