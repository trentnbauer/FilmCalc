name: Sync preset index manifests

# films/index.json and labs/index.json are the manifest the app fetches to
# discover which preset files exist (static hosting has no real directory
# listing). Their content — file, label, country, state, city — comes from
# each YAML file's own top-level fields where present, or (for files using
# the newer one-entry-per-file schema with no such fields) from how many
# folders deep the file sits under `films/`/`labs/` — see
# .github/scripts/generate-manifests.py's docstring for the exact rule.
# This workflow keeps the manifests in sync automatically instead of anyone
# hand-editing them (see #114/#116 follow-up: region metadata belongs in
# the data — the YAML fields or the folder path — not duplicated by hand
# into a second file that can drift). Shares its generator with the Docker
# build (build-docker-image.yml) via generate-manifests.py so there's only
# one implementation to keep correct (issue #165).
on:
  push:
    branches: [main]
    paths:
      - "films/**.yaml"
      - "films/**.yml"
      - "labs/**.yaml"
      - "labs/**.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate films/index.json and labs/index.json from the preset data
        run: python3 .github/scripts/generate-manifests.py films labs

      - name: Open a PR if the manifests changed
        # main requires a PR (repo ruleset) — a direct push here would just get
        # rejected, so commit to a branch and let the PR auto-merge once the
        # required checks pass instead.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- films/index.json labs/index.json; then
            echo "Manifests already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="sync-preset-index-${{ github.run_id }}"
          git checkout -b "$branch"
          git add films/index.json labs/index.json
          git commit -m "Sync films/index.json and labs/index.json from preset data"
          git push -u origin "$branch"
          gh pr create \
            --title "Sync films/index.json and labs/index.json from preset data" \
            --body "Automated: regenerated from the folder structure and content of \`films/\`/\`labs/\` after a push to main (see .github/scripts/generate-manifests.py)." \
            --base main --head "$branch"
          gh pr merge "$branch" --auto --squash
