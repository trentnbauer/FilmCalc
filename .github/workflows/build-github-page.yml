name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stamp build version into index.html
        run: sed -i "s/%%FILMCALC_VERSION%%/$(git rev-parse --short HEAD)/" index.html
      - name: Stamp Pages-only secrets into index.html and ads.txt
        # Pages-only monetization/analytics (see index.html's adSlot and GA
        # comments). ADSENSE_CLIENT_ID/ADSENSE_SLOT_ID/GA_MEASUREMENT_ID are
        # repo secrets (Settings → Secrets and variables → Actions) — not
        # sensitive, just kept out of the committed source so the Docker/
        # self-hosted build (which never runs this step) can't pick them up.
        # Unset secrets substitute to an empty string, which each index.html
        # guard script also treats as "disabled" — safe default until a
        # secret is added. -g is a no-op today (each token appears once per
        # line) but keeps this correct if a token ever shows up twice on one
        # line. ads.txt isn't copied into the Docker image at all (see
        # Dockerfile), so it doesn't need the same "stays literal" guard
        # index.html relies on. ads.txt then has its ca- prefix stripped:
        # ADSENSE_CLIENT_ID is the ca-pub-... form the adsbygoogle script/
        # data-ad-client need, but Google's ads.txt spec wants the bare
        # pub-... form (see Google's own ads.txt setup instructions) - using
        # the same secret verbatim there produces a line the AdSense crawler
        # won't match, which silently breaks site verification.
        run: |
          sed -i "s/%%ADSENSE_CLIENT_ID%%/${{ secrets.ADSENSE_CLIENT_ID }}/g" index.html
          sed -i "s/%%ADSENSE_SLOT_ID%%/${{ secrets.ADSENSE_SLOT_ID }}/g" index.html
          sed -i "s/%%GA_MEASUREMENT_ID%%/${{ secrets.GA_MEASUREMENT_ID }}/g" index.html
          sed -i "s/%%ADSENSE_CLIENT_ID%%/${{ secrets.ADSENSE_CLIENT_ID }}/g" ads.txt
          sed -i 's/, ca-pub-/, pub-/' ads.txt
      - name: Build Tailwind CSS
        # Regenerated into the working tree so the next step stages it, same
        # pattern as the preset manifests/changelog.json below; not committed
        # back. The checked-in css/tailwind.css is just the fallback for
        # offline/local Docker builds, which have no Node to run this step —
        # see css/README.md.
        run: npx --yes tailwindcss@3.4.17 -i css/tailwind.src.css -o css/tailwind.css --minify
      - name: Generate themes/index.json
        # themes/index.json is the browser's stand-in for a directory listing
        # (static hosting can't enumerate a folder). Generated into the
        # working tree so the next step stages it; not committed back.
        #
        # films/index.json and labs/index.json used to be regenerated here
        # too, the same way — but that generator only ever knew about
        # `label:`, so once films/labs entries grew `country`/`state`/`city`
        # (issue #114/#116's region tree) this step silently stripped them
        # back out on every deploy, no matter what was actually committed.
        # Those two are now generated by sync-preset-index.yml instead (from
        # the same YAML fields, committed back to the repo), and just copied
        # as-is in "Stage site files" below like any other file — one
        # generator per manifest, not two that can drift apart. See
        # .github/scripts/generate-manifests.py for the generator itself,
        # shared with build-docker-image.yml (issue #165).
        run: python3 .github/scripts/generate-manifests.py themes
      - name: Generate changelog.json
        # Footer "What's new" popup (issue #53) reads this at runtime.
        # Regenerated into the working tree (not committed back) same as the
        # preset manifests above; the checked-in changelog.json is just the
        # fallback for local/offline Docker builds that skip this step. See
        # .github/scripts/generate-changelog.py for the generator itself,
        # shared with build-docker-image.yml (issue #165).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/generate-changelog.py --repo "${{ github.repository }}"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Stage site files
        # The actual static app, plus films/ and labs/ — the Settings →
        # Import modal fetches films/index.json and labs/index.json (and
        # whatever preset files they list) at runtime, so those folders
        # need to be live on the deployed site, not just the Docker image.
        # js/ is index.html's own calculation engine (issue #61), loaded via
        # <script src> — also needs to be live, not just present in the repo.
        # css/ is the prebuilt Tailwind CSS (issue #74), just regenerated
        # above. ads.txt (AdSense site verification, issue #181 follow-up)
        # is Pages-only the same way, just via the Dockerfile never COPYing
        # it rather than a runtime guard. Docker/self-hosting files
        # (Dockerfile, compose, README) still don't belong here.
        run: |
          mkdir -p _site
          cp index.html favicon.ico icon.ico icon.svg apple-touch-icon.png options.yaml changelog.json ads.txt _site/
          cp -r films labs themes js css _site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
