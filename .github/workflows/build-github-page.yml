name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stamp build version into index.html
        run: sed -i "s/%%FILMCALC_VERSION%%/$(git rev-parse --short HEAD)/" index.html
      - name: Build Tailwind CSS
        # Regenerated into the working tree so the next step stages it, same
        # pattern as the preset manifests/changelog.json below; not committed
        # back. The checked-in css/tailwind.css is just the fallback for
        # offline/local Docker builds, which have no Node to run this step —
        # see css/README.md.
        run: npx --yes tailwindcss@3.4.17 -i css/tailwind.src.css -o css/tailwind.css --minify
      - name: Generate preset manifests
        # films/index.json and labs/index.json are the browser's stand-in for a
        # directory listing (static hosting can't enumerate a folder). Rather
        # than hand-maintain them, rebuild both here by globbing every *.yaml in
        # the folder. Each entry's label is read from the file's own top-level
        # `label:` line, falling back to a title-cased filename. Generated into
        # the working tree so the next step stages them; not committed back.
        run: |
          python3 - <<'PY'
          import glob, json, os, re

          def label_from_file(path):
              # Cheap top-level "label:" scan — avoids a YAML dep and is safe
              # because label is always a plain scalar on its own line.
              with open(path, encoding='utf-8') as fh:
                  for line in fh:
                      m = re.match(r'label:\s*(.+?)\s*$', line)
                      if m:
                          return m.group(1).strip().strip('"\'')
                      # Stop at the first list/array item — no top-level label present.
                      if line.lstrip().startswith('- '):
                          break
              # Fallback: prettomsify the filename, e.g. "melbourne-labs" -> "Melbourne Labs"
              stem = os.path.splitext(os.path.basename(path))[0]
              return re.sub(r'[-_]+', ' ', stem).title()

          for folder in ('films', 'labs', 'themes'):
              files = sorted(
                  os.path.basename(p) for p in glob.glob(f'{folder}/*.yaml') + glob.glob(f'{folder}/*.yml')
              )
              entries = [{'file': f, 'label': label_from_file(os.path.join(folder, f))} for f in files]
              with open(f'{folder}/index.json', 'w', encoding='utf-8') as out:
                  json.dump(entries, out, indent=2, ensure_ascii=False)
                  out.write('\n')
              print(f'{folder}/index.json -> {len(entries)} preset(s): ' + ', '.join(f["file"] for f in entries))
          PY
      - name: Generate changelog.json
        # Footer "What's new" popup (issue #53) reads this at runtime. Built
        # from merged PR titles rather than hand-maintained, so it can't go
        # stale — but a PR that only touched .github/workflows/** is a CI/repo
        # change, not something an end user would recognize as "new in the
        # app", so those are filtered out. Regenerated into the working tree
        # (not committed back) same as the preset manifests above; the
        # checked-in changelog.json is just the fallback for local/offline
        # Docker builds that skip this step.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --repo "${{ github.repository }}" --state merged --limit 200 \
            --json number,title,mergedAt,url > /tmp/merged-prs.json

          python3 - <<'PY'
          import json, subprocess

          with open('/tmp/merged-prs.json', encoding='utf-8') as f:
              prs = json.load(f)

          entries = []
          for pr in prs:
              files = subprocess.run(
                  ['gh', 'pr', 'view', str(pr['number']), '--json', 'files', '-q', '.files[].path'],
                  capture_output=True, text=True, check=True
              ).stdout.splitlines()
              if files and all(p.startswith('.github/') for p in files):
                  continue
              entries.append({
                  'number': pr['number'],
                  'title': pr['title'],
                  'mergedAt': pr['mergedAt'],
                  'url': pr['url'],
              })

          entries.sort(key=lambda e: e['mergedAt'], reverse=True)

          with open('changelog.json', 'w', encoding='utf-8') as out:
              json.dump(entries, out, indent=2, ensure_ascii=False)
              out.write('\n')
          print(f'changelog.json -> {len(entries)} entries')
          PY
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Stage site files
        # The actual static app, plus films/ and labs/ — the Settings →
        # Import modal fetches films/index.json and labs/index.json (and
        # whatever preset files they list) at runtime, so those folders
        # need to be live on the deployed site, not just the Docker image.
        # js/ is index.html's own calculation engine (issue #61), loaded via
        # <script src> — also needs to be live, not just present in the repo.
        # css/ is the prebuilt Tailwind CSS (issue #74), just regenerated
        # above. Docker/self-hosting files (Dockerfile, compose, README)
        # still don't belong here.
        run: |
          mkdir -p _site
          cp index.html favicon.ico icon.ico icon.svg apple-touch-icon.png options.yaml changelog.json _site/
          cp -r films labs themes js css _site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
