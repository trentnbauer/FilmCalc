name: Daily Issue PRs

# Runs at 1am AEST (UTC+10, fixed year-round) every day. GitHub Actions
# cron has no timezone support, so this is pinned to 15:00 UTC — in
# Sydney/Melbourne that's 1am AEST but 2am AEDT during daylight saving
# (Oct-Apr).
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

concurrency:
  # Prevent a manual run from overlapping with the scheduled one (or two
  # manual runs from overlapping each other).
  group: daily-issue-prs
  cancel-in-progress: false

jobs:
  issue-prs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure tracking label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "claude-attempted" \
            --repo ${{ github.repository }} \
            --color "5319e7" \
            --description "Claude has opened a PR for this issue, or judged it too ambiguous to attempt unsupervised. Remove this label to have it retried tomorrow." \
            --force

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: '--allowed-tools "Bash(gh:*),Bash(git:*),Read,Edit,Write,Grep,Glob"'
          prompt: |
            You are running as a scheduled, unattended job with no human present. Be conservative:
            implement a real, working fix for what each issue actually describes. Do not guess wildly
            at ambiguous requests, do not refactor or "improve" unrelated code, and never merge, approve,
            or push anything to main directly — every change goes through a PR for the repo owner to
            review by hand.

            1. List this repo's open issues authored by ${{ github.repository_owner }}, oldest first:
               gh issue list --repo ${{ github.repository }} --author ${{ github.repository_owner }} \
                 --state open --json number,title,body,labels,createdAt \
                 --jq 'sort_by(.createdAt)'

               Skip any issue that already has the "claude-attempted" label — it's already been
               handled (a PR was opened, or it was judged too ambiguous) and shouldn't be retried
               automatically. A human removing that label is the signal to try it again.

               If nothing remains after that filter, stop here — do not create a branch, commit, PR,
               or comment.

            2. For each remaining issue, in order, fully finish (or explicitly skip) it before moving
               to the next, so a problem with one doesn't leave a half-finished branch blocking the
               rest:

               a. Read the issue fully and decide whether it's something you can implement with
                  reasonable confidence in what "done" looks like — the same judgment call you'd make
                  if a human asked you to "just implement this issue" with no other context. If it's
                  too vague, too large for one PR, or hinges on a decision only the repo owner can
                  make (a design/product choice, a hosting/infra tradeoff, a security-sensitive
                  default, etc.), do NOT implement it. Instead, post a comment on the issue explaining
                  specifically what's unclear or what decision is needed, then go to step (d).

               b. If you can implement it: create a new branch named
                  `claude/issue-<number>-<short-slug>`, implement the change, and verify it actually
                  works before committing — read the surrounding code so the change matches existing
                  conventions, and sanity-check syntax/behaviour (e.g. for index.html, confirm the
                  HTML/JS is well-formed; run any existing checks that apply). Commit with a message
                  explaining what changed and why, and push the branch.

               c. Open a PR against main with `gh pr create`: title describing the change, a body
                  explaining what was done and why, including the line `Fixes #<number>`, and a short
                  test-plan checklist of what you actually verified. Do not merge it, do not approve
                  it, and do not push to main directly — it's for the repo owner to review.

               d. Either way — PR opened, or skipped as too ambiguous — add the "claude-attempted"
                  label to the issue so it isn't reprocessed tomorrow:
                  gh issue edit <number> --repo ${{ github.repository }} --add-label "claude-attempted"
