name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "Dockerfile"
      - "default.conf"
      - "favicon.ico"
      - "icon.ico"
      - "icon.svg"
      - "apple-touch-icon.png"
      - "manifest.json"
      - "sw.js"
      - "options.yaml"
      - "films/**"
      - "labs/**"
      - "themes/**"
      - ".github/workflows/build-docker-image.yml"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate preset manifests
        # Keep films/index.json and labs/index.json in sync with whatever *.yaml
        # files exist, so the Docker image's Import list matches the folder —
        # same generator as the Pages deploy workflow. Runs before the build so
        # the COPY films/labs step picks up fresh manifests.
        run: |
          python3 - <<'PY'
          import glob, json, os, re

          def label_from_file(path):
              with open(path, encoding='utf-8') as fh:
                  for line in fh:
                      m = re.match(r'label:\s*(.+?)\s*$', line)
                      if m:
                          return m.group(1).strip().strip('"\'')
                      if line.lstrip().startswith('- '):
                          break
              stem = os.path.splitext(os.path.basename(path))[0]
              return re.sub(r'[-_]+', ' ', stem).title()

          for folder in ('films', 'labs', 'themes'):
              files = sorted(
                  os.path.basename(p) for p in glob.glob(f'{folder}/*.yaml') + glob.glob(f'{folder}/*.yml')
              )
              entries = [{'file': f, 'label': label_from_file(os.path.join(folder, f))} for f in files]
              with open(f'{folder}/index.json', 'w', encoding='utf-8') as out:
                  json.dump(entries, out, indent=2, ensure_ascii=False)
                  out.write('\n')
              print(f'{folder}/index.json -> {len(entries)} preset(s): ' + ', '.join(f["file"] for f in entries))
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
