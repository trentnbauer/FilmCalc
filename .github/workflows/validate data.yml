name: Validate film & lab data

# Runs on every PR that touches the data files, so a contributor who gets the
# YAML indentation wrong finds out immediately (with a readable message) instead
# of silently breaking the site on merge.
on:
  pull_request:
    paths:
      - "films/**"
      - "labs/**"
      - "themes/**"
      - "options.yaml"
  push:
    branches: [main]
    paths:
      - "films/**"
      - "labs/**"
      - "themes/**"
      - "options.yaml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check the YAML is valid and complete
        run: |
          python3 - <<'PY'
          import glob, re, sys, yaml
          from collections import defaultdict

          VALID_PROCESSES = {"C41", "BW", "E6", "ECN2"}
          VALID_FORMATS = {"35mm", "120", "110", "127", "220", "sheet"}
          VALID_TURNAROUND = {"next_day", "same_week", "longer"}
          VALID_PUSHPULL_TYPE = {"per_stop", "flat"}
          VALID_AVAILABILITY = {"national", "state", "city"}

          errors = []

          def err(f, msg):
              errors.append(f"{f}: {msg}")

          # ---- films ----
          # Tracks every spelling seen for each (name, boxSpeed, format) once
          # normalised (trimmed + lowercased) — the app merges film entries
          # across preset files by that same normalised key at import time
          # (see filmKey() in js/dev-cost-calc.js), so two spellings that only
          # differ in case/whitespace (e.g. "Kodak ColorPlus" vs.
          # "Kodak Colorplus") silently show up as duplicate entries instead
          # of merging.
          film_name_spellings = defaultdict(set)
          film_name_locations = defaultdict(list)
          for path in sorted(glob.glob("films/*.yaml") + glob.glob("films/*.yml")):
              try:
                  doc = yaml.safe_load(open(path))
              except yaml.YAMLError as e:
                  err(path, f"not valid YAML — check your indentation (spaces, never tabs).\n    {e}")
                  continue
              if not isinstance(doc, dict) or "films" not in doc:
                  err(path, "expected a top-level 'films:' list")
                  continue
              if not doc.get("country"):
                  err(path, "missing top-level 'country' — films/index.json is generated from this")
              for i, film in enumerate(doc["films"] or []):
                  where = f"film #{i+1} ({film.get('name', 'unnamed')})"
                  for key in ("name", "boxSpeed", "process", "bundles"):
                      if key not in film:
                          err(path, f"{where}: missing required field '{key}'")
                  if film.get("name"):
                      norm_name = re.sub(r"\s+", " ", film["name"].strip()).lower()
                      norm_key = (norm_name, film.get("boxSpeed"), film.get("format", "35mm"))
                      film_name_spellings[norm_key].add(film["name"])
                      film_name_locations[norm_key].append(path)
                  if film.get("process") and film["process"] not in VALID_PROCESSES:
                      err(path, f"{where}: process '{film['process']}' must be one of {sorted(VALID_PROCESSES)}")
                  fmt = film.get("format", "35mm")
                  if fmt not in VALID_FORMATS:
                      err(path, f"{where}: format '{fmt}' must be one of {sorted(VALID_FORMATS)}")
                  if not isinstance(film.get("boxSpeed"), int):
                      err(path, f"{where}: boxSpeed must be a plain number (no quotes)")
                  for j, b in enumerate(film.get("bundles") or []):
                      bw = f"{where}, bundle #{j+1}"
                      for key in ("rolls", "exposures", "filmCost"):
                          if key not in b:
                              err(path, f"{bw}: missing required field '{key}'")
                      if isinstance(b.get("filmCost"), str):
                          err(path, f"{bw}: filmCost must be a number, not text (write 24.95, not '$24.95')")
                      if b.get("rolls") == 0 or b.get("exposures") == 0:
                          err(path, f"{bw}: rolls and exposures must be greater than 0")
                      avail = b.get("availability", "national")
                      if avail not in VALID_AVAILABILITY:
                          err(path, f"{bw}: availability '{avail}' must be one of {sorted(VALID_AVAILABILITY)}")
                      if avail in ("state", "city") and not b.get("state"):
                          err(path, f"{bw}: availability '{avail}' needs a 'state'")
                      if avail == "city" and not b.get("city"):
                          err(path, f"{bw}: availability 'city' needs a 'city'")

          for norm_key, spellings in film_name_spellings.items():
              if len(spellings) > 1:
                  name, box_speed, fmt = norm_key
                  files = ", ".join(sorted(set(film_name_locations[norm_key])))
                  err(
                      files,
                      f"'{name}' at {box_speed} ISO ({fmt}) is spelled {sorted(spellings)} across these "
                      "files — the app merges film entries across preset files by name+boxSpeed+format, "
                      "so mismatched capitalisation/whitespace shows up as duplicate entries instead of "
                      "merging. Use the exact same spelling everywhere."
                  )

          # ---- labs ----
          for path in sorted(glob.glob("labs/*.yaml") + glob.glob("labs/*.yml")):
              try:
                  doc = yaml.safe_load(open(path))
              except yaml.YAMLError as e:
                  err(path, f"not valid YAML — check your indentation (spaces, never tabs).\n    {e}")
                  continue
              if not isinstance(doc, dict) or "labs" not in doc:
                  err(path, "expected a top-level 'labs:' list")
                  continue
              for key in ("country", "state", "city"):
                  if not doc.get(key):
                      err(path, f"missing top-level '{key}' — labs/index.json is generated from this")
              for i, lab in enumerate(doc["labs"] or []):
                  where = f"lab #{i+1} ({lab.get('name', 'unnamed')})"
                  if "name" not in lab:
                      err(path, f"{where}: missing required field 'name'")
                  if not lab.get("services"):
                      err(path, f"{where}: needs at least one entry under 'services:'")
                  for j, s in enumerate(lab.get("services") or []):
                      sw = f"{where}, service #{j+1}"
                      if "devCost" not in s:
                          err(path, f"{sw}: missing required field 'devCost'")
                      if isinstance(s.get("devCost"), str):
                          err(path, f"{sw}: devCost must be a number, not text (write 17, not '$17')")
                      if isinstance(s.get("mailBackCost"), str):
                          err(path, f"{sw}: mailBackCost must be a number, not text (write 5, not '$5')")
                      t = s.get("turnaroundTime")
                      if t and t not in VALID_TURNAROUND:
                          err(path, f"{sw}: turnaroundTime '{t}' must be one of {sorted(VALID_TURNAROUND)}")
                      pt = s.get("pushPullType")
                      if pt and pt not in VALID_PUSHPULL_TYPE:
                          err(path, f"{sw}: pushPullType '{pt}' must be 'per_stop' or 'flat'")
                      for p in (s.get("processes") or []):
                          if p not in VALID_PROCESSES:
                              err(path, f"{sw}: process '{p}' must be one of {sorted(VALID_PROCESSES)}")

          # ---- themes ----
          # Mirrors js/themes.js's own loadThemeList()/applyThemeVars() — a
          # theme needs at least one of light:/dark: (see #82: this whole
          # folder used to be invisible to CI, so a typo'd colour key would
          # sit there silently doing nothing instead of failing the PR).
          VALID_THEME_KEYS = {
              "pageBg", "cardBg", "accent",
              "cheapestBg", "cheapestText", "recommendedBg", "recommendedText",
              "favourite", "defaultLab", "warningBg", "warningText",
              "dangerBg", "dangerText", "sectionBg", "sectionText",
          }
          for path in sorted(glob.glob("themes/*.yaml") + glob.glob("themes/*.yml")):
              try:
                  doc = yaml.safe_load(open(path))
              except yaml.YAMLError as e:
                  err(path, f"not valid YAML — check your indentation (spaces, never tabs).\n    {e}")
                  continue
              if not isinstance(doc, dict):
                  err(path, "expected a top-level mapping with light:/dark: blocks")
                  continue
              if not doc.get("light") and not doc.get("dark"):
                  err(path, "needs at least one of 'light:' or 'dark:' — a theme with neither is ignored at runtime")
                  continue
              if "label" in doc and not isinstance(doc["label"], str):
                  err(path, "'label' must be plain text")
              for mode in ("light", "dark"):
                  block = doc.get(mode)
                  if block is None:
                      continue
                  if not isinstance(block, dict):
                      err(path, f"'{mode}:' must be a mapping of colour keys, not a list/scalar")
                      continue
                  for key, value in block.items():
                      if key not in VALID_THEME_KEYS:
                          err(path, f"{mode}.{key}: not a recognised colour key (typo? valid keys: {sorted(VALID_THEME_KEYS)})")
                      elif not isinstance(value, str):
                          err(path, f"{mode}.{key}: must be a colour string (hex like \"#0369a1\" or a CSS colour name), not {type(value).__name__}")

          # ---- options ----
          try:
              yaml.safe_load(open("options.yaml"))
          except FileNotFoundError:
              pass
          except yaml.YAMLError as e:
              err("options.yaml", f"not valid YAML:\n    {e}")

          if errors:
              print("\n❌ Found some problems with the data files:\n")
              for e in errors:
                  print(f"  • {e}")
              print(
                  "\nSee CONTRIBUTING.md for the correct format. The most common cause is\n"
                  "indentation — YAML uses spaces, never tabs, and your entry must line up\n"
                  "with the ones around it. Copying an existing entry and editing it is the\n"
                  "safest approach.\n"
              )
              sys.exit(1)

          print("✅ All film and lab data looks good.")
          PY

  claude-sanity-check:
    # Only meaningful with a PR to comment on, and only worth an LLM call once
    # the data is at least structurally valid.
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      # A new push should replace the in-flight check of the commit it
      # superseded, not queue up alongside it.
      group: claude-sanity-check-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude data sanity check
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Both daily-claude-run.yml and film-lab-intake.yml open PRs authored by
          # claude[bot] -- exactly the PRs this check most needs to review. Without
          # this, the action's own bot-actor guard refuses to run on them at all.
          allowed_bots: claude
          claude_args: '--allowed-tools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api repos/*/pulls/*/comments:*),WebFetch,Read,Grep,Glob"'
          prompt: |
            This PR changed film and/or lab data files. Read "DATA_SPEC.md" in the repo root — it is
            the authoritative rules a film/lab entry must follow. Then review ONLY the added/changed
            lines in this PR (gh pr diff ${{ github.event.pull_request.number }}) against those rules,
            specifically the things the schema validator that already ran in this workflow can't check:

            - No `UNKNOWN` values left in.
            - Price is the regular price, not a sale/discount price (watch for wording suggesting a sale).
            - Films: a mainstream, reliably available stock — not rare/limited-run/novelty editions,
              not usually out of stock, not an expired-stock-only listing.
            - Films: `name` correctly excludes the ISO, except where the number is genuinely part of
              the product name (e.g. Portra 400 vs Portra 160/800).
            - Films are grouped in the right file for their country; labs in the right file for their
              city. Flag anything that looks like it's in the wrong file.
            - Labs: `services` has one entry per distinct price the lab actually charges, not one
              lab-wide entry covering several prices.
            - Labs: `address` reads like a real, geocodable street address.
            - If a film `buyLink` or lab `website` is present, try fetching it with WebFetch. If it
              loads, sanity-check that the price/name roughly match what's in the YAML. If it doesn't
              load, or you're not confident, say so explicitly rather than guessing.

            Post exactly one PR comment summarizing what you found:
            gh pr comment ${{ github.event.pull_request.number }} --body "..."

            If everything looks right, say so briefly. If something looks off, list it per entry with
            the file and what's wrong. This is advisory only: do not edit any files yourself, do not
            approve/request changes, do not block or merge the PR.

            **Issue #111 — amend the two purely mechanical issues, as one-click GitHub suggestions.**
            Everything above is judgment calls a human should make. These two are not — DATA_SPEC.md
            states them as absolute rules with no ambiguity, so propose the exact fix instead of just
            describing it:

            - `hidden: true` (or any truthy value) on a film or lab entry/bundle in the diff's added
              lines — DATA_SPEC.md says this must always be `false`.
            - A `buyLink` or `website` URL containing tracking junk (`utm_*`, `gclid`, `fbclid`, and
              similar) — DATA_SPEC.md says to strip it.

            For each match, post an inline PR review comment containing a GitHub suggested-change
            block, so the contributor can accept it with one click instead of retyping:
            ```
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
              -f body=$'One-sentence reason, citing DATA_SPEC.md.\n\n```suggestion\n<the corrected line, exact original indentation>\n```' \
              -f commit_id=<the PR head SHA — from `gh pr view ${{ github.event.pull_request.number }} --json headRefOid -q .headRefOid`> \
              -f path=<file path relative to repo root> \
              -F line=<line number in the NEW version of the file> \
              -f side=RIGHT
            ```
            Suggestion blocks fail silently or apply wrong if the line number or indentation is off, so
            only post one when you're confident you have the exact line (cross-check the file's current
            content at the PR head, not just the diff hunk headers) — for anything you're not sure of,
            just mention it in the summary comment instead of guessing at a suggestion. This never
            needs `contents: write` or pushing to the PR's branch, so it works the same whether the PR
            is from a fork or not — the contributor stays in control of whether to accept each fix.
