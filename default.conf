# FilmCalc — nginx site config for the self-hosted Docker build.
# (GitHub Pages, the primary hosting for this app, is fully static and
# never touches this file — it only applies to `docker compose up`.)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # "Write Live Config to Server" (Settings tab) PUTs the current films/
    # labs/settings straight to this file instead of a download/upload
    # round-trip. Uses nginx's built-in WebDAV module (compiled into the
    # standard nginx:alpine image) — no third-party module needed since we
    # only require PUT, not the full WebDAV verb set.
    #
    # There's no authentication on this endpoint at the nginx layer. If
    # you're exposing this container beyond your own network (e.g. via a
    # Cloudflare Tunnel), put it behind a Cloudflare Access policy — anyone
    # who can reach this path can overwrite config.yaml for every visitor.
    location = /config.yaml {
        dav_methods PUT;
        create_full_put_path off;
        dav_access user:rw group:r all:r;
        client_max_body_size 1m;
        client_body_temp_path /tmp/client_temp;
    }
}
