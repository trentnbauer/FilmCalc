<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Cost Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', }
    </script>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 font-sans min-h-screen flex items-center justify-center p-4 transition-colors duration-200">

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 md:p-8 max-w-md w-full relative transition-colors duration-200">
        
        <button id="themeToggle" class="absolute top-6 right-6 p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500" aria-label="Toggle Dark Mode">
            <svg id="themeToggleLightIcon" class="hidden w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 3.22a1 1 0 011.415 0l.708.708a1 1 0 01-1.414 1.414l-.708-.708a1 1 0 010-1.414zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM14.22 15.78a1 1 0 010 1.415l-.708.708a1 1 0 01-1.414-1.414l.708-.708a1 1 0 011.415 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-3.22a1 1 0 01-1.415 0l-.708-.708a1 1 0 011.414-1.414l.708.708a1 1 0 010 1.415zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1zm3.22-4.22a1 1 0 010-1.415l.708-.708a1 1 0 011.414 1.414l-.708.708a1 1 0 01-1.415 0zM10 5a5 5 0 100 10 5 5 0 000-10z" clip-rule="evenodd"></path></svg>
            <svg id="themeToggleDarkIcon" class="hidden w-5 h-5 text-gray-700" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        </button>

        <h1 class="text-2xl font-bold text-center mb-6 text-gray-900 dark:text-white pr-8">Film Cost Calculator</h1>

        <div class="mb-4 bg-purple-50 dark:bg-purple-900/20 p-4 rounded-lg border border-purple-100 dark:border-purple-800/30">
            <label class="block text-sm font-semibold text-purple-800 dark:text-purple-400 mb-2 uppercase tracking-wide">Saved Film Profiles</label>
            <div class="flex gap-2">
                <select id="savedFilmsDropdown" class="flex-1 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-purple-500 outline-none transition-colors">
                    <option value="">-- Loading films... --</option>
                </select>
                <button id="saveFilmBtn" type="button" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded shadow transition-colors font-medium">Save</button>
            </div>
        </div>

        <div class="mb-6 bg-teal-50 dark:bg-teal-900/20 p-4 rounded-lg border border-teal-100 dark:border-teal-800/30">
            <label class="block text-sm font-semibold text-teal-800 dark:text-teal-400 mb-2 uppercase tracking-wide">Saved Lab Profiles</label>
            <div class="flex gap-2">
                <select id="savedLabsDropdown" class="flex-1 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-teal-500 outline-none transition-colors">
                    <option value="">-- Load a saved lab --</option>
                </select>
                <button id="saveLabBtn" type="button" class="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded shadow transition-colors font-medium">Save</button>
            </div>
        </div>
        
        <form id="calculatorForm" class="space-y-4">
            <div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-lg space-y-3 transition-colors duration-200">
                <h2 class="font-semibold text-blue-800 dark:text-blue-400 text-sm uppercase tracking-wide">The Film</h2>
                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Film Name</label>
                        <input type="text" id="filmName" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" placeholder="e.g. Portra">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">ISO</label>
                        <input type="number" id="filmIso" min="1" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" placeholder="400">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">Total cost of film pack ($ incl. postage)</label>
                    <input type="number" id="filmCost" step="0.01" min="0" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" placeholder="e.g. 45.00" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Rolls in pack</label>
                        <input type="number" id="rolls" min="1" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" value="1" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Exposures/Roll</label>
                        <input type="number" id="exposures" min="1" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" value="36" required>
                    </div>
                </div>
            </div>

            <div class="bg-green-50 dark:bg-green-900/20 p-4 rounded-lg space-y-3 transition-colors duration-200">
                <h2 class="font-semibold text-green-800 dark:text-green-400 text-sm uppercase tracking-wide">Lab Costs (Per Roll)</h2>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">Lab Name</label>
                    <input type="text" id="labName" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-green-500 outline-none transition-colors" placeholder="e.g. Local Pharmacy">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Developing ($)</label>
                        <input type="number" id="devCost" step="0.01" min="0" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-green-500 outline-none transition-colors" value="0">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Push / Pull ($)</label>
                        <input type="number" id="pushPullCost" step="0.01" min="0" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-green-500 outline-none transition-colors" value="0">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Scanning ($)</label>
                        <input type="number" id="scanCost" step="0.01" min="0" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-green-500 outline-none transition-colors" value="0">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Printing ($)</label>
                        <input type="number" id="printCost" step="0.01" min="0" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-green-500 outline-none transition-colors" value="0">
                    </div>
                </div>
            </div>
        </form>

        <div class="mt-8 text-center bg-gray-50 dark:bg-gray-700/50 p-4 rounded-lg border border-gray-200 dark:border-gray-600 transition-colors duration-200">
            <p class="text-sm text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">True Cost Per Photo</p>
            <div class="text-4xl font-bold text-gray-900 dark:text-white" id="costPerPhoto">$0.00</div>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-2" id="breakdown">Total Cost: $0.00 | Total Photos: 0</p>
        </div>
    </div>

    <script>
        // --- State ---
        let defaultFilms = {};
        
        const defaultLabs = {
            "Standard Lab (Dev + Scan)": { name: "Standard Lab (Dev + Scan)", devCost: 8, pushPullCost: 0, scanCost: 12, printCost: 0 },
            "Pro Lab (High Res Scans)": { name: "Pro Lab (High Res Scans)", devCost: 10, pushPullCost: 3, scanCost: 20, printCost: 0 },
            "Pharmacy (Prints Included)": { name: "Pharmacy (Prints Included)", devCost: 5, pushPullCost: 0, scanCost: 5, printCost: 10 },
            "Mail-in (Dev Only)": { name: "Mail-in (Dev Only)", devCost: 6, pushPullCost: 2, scanCost: 0, printCost: 0 }
        };

        // --- CSV Loader (Films) ---
        async function loadCSV() {
            try {
                const response = await fetch('films.csv');
                if (!response.ok) throw new Error("Could not fetch CSV");
                
                const csvText = await response.text();
                const lines = csvText.split('\n');
                const headers = lines[0].split(',').map(h => h.trim());
                
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue; 
                    const values = lines[i].split(',');
                    const film = {};
                    
                    for (let j = 0; j < headers.length; j++) {
                        let val = values[j] ? values[j].trim() : '';
                        if (headers[j] !== 'name') {
                            val = parseFloat(val) || 0; 
                        }
                        film[headers[j]] = val;
                    }
                    if (film.name) defaultFilms[film.name] = film;
                }
            } catch (error) {
                console.error("Error loading films.csv, falling back to empty defaults.", error);
            } finally {
                updateFilmDropdown();
            }
        }

        // --- Calculator Logic ---
        function calculateCost() {
            const filmCost = parseFloat(document.getElementById('filmCost').value) || 0;
            const rolls = parseInt(document.getElementById('rolls').value) || 1;
            const exposures = parseInt(document.getElementById('exposures').value) || 1;
            
            const devCost = parseFloat(document.getElementById('devCost').value) || 0;
            const pushPullCost = parseFloat(document.getElementById('pushPullCost').value) || 0;
            const scanCost = parseFloat(document.getElementById('scanCost').value) || 0;
            const printCost = parseFloat(document.getElementById('printCost').value) || 0;

            const labCostPerRoll = devCost + pushPullCost + scanCost + printCost;
            const totalLabCost = labCostPerRoll * rolls;
            const grandTotal = filmCost + totalLabCost;
            const totalPhotos = exposures * rolls;
            
            const costPerPhoto = totalPhotos > 0 ? (grandTotal / totalPhotos) : 0;

            document.getElementById('costPerPhoto').innerText = `$${costPerPhoto.toFixed(2)}`;
            document.getElementById('breakdown').innerText = `Grand Total: $${grandTotal.toFixed(2)} | Total Photos: ${totalPhotos}`;
        }

        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('input', calculateCost);
        });

        // --- Film Save/Load Logic ---
        function getMergedFilms() {
            const savedFilms = JSON.parse(localStorage.getItem('filmProfiles')) || {};
            return { ...defaultFilms, ...savedFilms };
        }

        function updateFilmDropdown() {
            const dropdown = document.getElementById('savedFilmsDropdown');
            const allFilms = getMergedFilms();
            
            dropdown.innerHTML = '<option value="">-- Load a saved film --</option>';
            const sortedNames = Object.keys(allFilms).sort();

            sortedNames.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                const isoStr = allFilms[name].iso ? ` (ISO ${allFilms[name].iso})` : '';
                opt.textContent = `${name}${isoStr}`;
                dropdown.appendChild(opt);
            });
        }

        function saveFilmProfile() {
            const name = document.getElementById('filmName').value.trim();
            if (!name) { alert("Please enter a Film Name to save this profile."); return; }

            const profile = {
                name: name,
                iso: document.getElementById('filmIso').value,
                filmCost: document.getElementById('filmCost').value,
                rolls: document.getElementById('rolls').value,
                exposures: document.getElementById('exposures').value
            };

            let savedFilms = JSON.parse(localStorage.getItem('filmProfiles')) || {};
            savedFilms[name] = profile; 
            localStorage.setItem('filmProfiles', JSON.stringify(savedFilms));
            
            const saveBtn = document.getElementById('saveFilmBtn');
            const originalText = saveBtn.innerText;
            saveBtn.innerText = "Saved!";
            setTimeout(() => saveBtn.innerText = originalText, 1500);

            updateFilmDropdown();
            document.getElementById('savedFilmsDropdown').value = name;
        }

        function loadFilmProfile(e) {
            const name = e.target.value;
            if (!name) return; 

            const allFilms = getMergedFilms();
            const profile = allFilms[name];

            if (profile) {
                document.getElementById('filmName').value = profile.name || '';
                document.getElementById('filmIso').value = profile.iso || '';
                document.getElementById('filmCost').value = profile.filmCost || ''; 
                document.getElementById('rolls').value = profile.rolls || '1';
                document.getElementById('exposures').value = profile.exposures || '36';
                calculateCost();
            }
        }

        // --- Lab Save/Load Logic ---
        function getMergedLabs() {
            const savedLabs = JSON.parse(localStorage.getItem('labProfiles')) || {};
            return { ...defaultLabs, ...savedLabs };
        }

        function updateLabDropdown() {
            const dropdown = document.getElementById('savedLabsDropdown');
            const allLabs = getMergedLabs();
            
            dropdown.innerHTML = '<option value="">-- Load a saved lab --</option>';
            const sortedNames = Object.keys(allLabs).sort();

            sortedNames.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                dropdown.appendChild(opt);
            });
        }

        function saveLabProfile() {
            const name = document.getElementById('labName').value.trim();
            if (!name) { alert("Please enter a Lab Name to save this profile."); return; }

            const profile = {
                name: name,
                devCost: document.getElementById('devCost').value,
                pushPullCost: document.getElementById('pushPullCost').value,
                scanCost: document.getElementById('scanCost').value,
                printCost: document.getElementById('printCost').value
            };

            let savedLabs = JSON.parse(localStorage.getItem('labProfiles')) || {};
            savedLabs[name] = profile; 
            localStorage.setItem('labProfiles', JSON.stringify(savedLabs));
            
            const saveBtn = document.getElementById('saveLabBtn');
            const originalText = saveBtn.innerText;
            saveBtn.innerText = "Saved!";
            setTimeout(() => saveBtn.innerText = originalText, 1500);

            updateLabDropdown();
            document.getElementById('savedLabsDropdown').value = name;
        }

        function loadLabProfile(e) {
            const name = e.target.value;
            if (!name) return; 

            const allLabs = getMergedLabs();
            const profile = allLabs[name];

            if (profile) {
                document.getElementById('labName').value = profile.name || '';
                document.getElementById('devCost').value = profile.devCost || '';
                document.getElementById('pushPullCost').value = profile.pushPullCost || '';
                document.getElementById('scanCost').value = profile.scanCost || '';
                document.getElementById('printCost').value = profile.printCost || '';
                calculateCost();
            }
        }

        // Event Listeners
        document.getElementById('saveFilmBtn').addEventListener('click', saveFilmProfile);
        document.getElementById('savedFilmsDropdown').addEventListener('change', loadFilmProfile);
        
        document.getElementById('saveLabBtn').addEventListener('click', saveLabProfile);
        document.getElementById('savedLabsDropdown').addEventListener('change', loadLabProfile);

        // --- Dark Mode Toggle Logic ---
        const themeToggleDarkIcon = document.getElementById('themeToggleDarkIcon');
        const themeToggleLightIcon = document.getElementById('themeToggleLightIcon');
        const themeToggleBtn = document.getElementById('themeToggle');

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        // Initialize App
        loadCSV();
        updateLabDropdown();

    </script>
</body>
</html>
