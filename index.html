<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Cost Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 font-sans min-h-screen flex items-center justify-center p-4 transition-colors duration-200">

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 md:p-8 max-w-2xl w-full relative transition-colors duration-200">
        
        <button id="themeToggle" class="absolute top-6 right-6 p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500" aria-label="Toggle Dark Mode">
            <svg id="themeToggleLightIcon" class="hidden w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 3.22a1 1 0 011.415 0l.708.708a1 1 0 01-1.414 1.414l-.708-.708a1 1 0 010-1.414zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM14.22 15.78a1 1 0 010 1.415l-.708.708a1 1 0 01-1.414-1.414l-.708-.708a1 1 0 011.415 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-3.22a1 1 0 01-1.415 0l-.708-.708a1 1 0 011.414-1.414l.708.708a1 1 0 010 1.415zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1zm3.22-4.22a1 1 0 010-1.415l.708-.708a1 1 0 011.414 1.414l-.708.708a1 1 0 01-1.415 0zM10 5a5 5 0 100 10 5 5 0 000-10z" clip-rule="evenodd"></path></svg>
            <svg id="themeToggleDarkIcon" class="hidden w-5 h-5 text-gray-700" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        </button>

        <h1 class="text-3xl font-bold text-center mb-8 text-gray-900 dark:text-white pr-8">Film Cost Calculator</h1>
        
        <form id="calculatorForm" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-purple-50 dark:bg-purple-900/20 p-4 rounded-lg border border-purple-100 dark:border-purple-800/30">
                    <label class="block text-sm font-semibold text-purple-800 dark:text-purple-400 mb-2 uppercase tracking-wide">Film Management</label>
                    <select id="savedFilmsDropdown" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 mb-2 text-sm"><option value="">-- Load a saved film --</option></select>
                    <button id="deleteFilmBtn" type="button" class="w-full bg-red-500 hover:bg-red-600 text-white py-1 rounded text-sm font-bold">Delete Selected Film</button>
                </div>
                <div class="bg-teal-50 dark:bg-teal-900/20 p-4 rounded-lg border border-teal-100 dark:border-teal-800/30">
                    <label class="block text-sm font-semibold text-teal-800 dark:text-teal-400 mb-2 uppercase tracking-wide">Lab Management</label>
                    <select id="savedLabsDropdown" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 mb-2 text-sm"><option value="">-- Load a saved lab --</option></select>
                    <button id="deleteLabBtn" type="button" class="w-full bg-red-500 hover:bg-red-600 text-white py-1 rounded text-sm font-bold">Delete Selected Lab</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-lg space-y-3">
                    <h2 class="font-semibold text-blue-800 dark:text-blue-400 text-sm uppercase tracking-wide">Film Setup</h2>
                    <input type="text" id="filmName" class="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600" placeholder="Film Name">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="boxSpeed" placeholder="Box Speed" class="border p-2 rounded dark:bg-gray-700 dark:border-gray-600">
                        <input type="number" id="devSpeed" placeholder="Dev Speed" class="border p-2 rounded dark:bg-gray-700 dark:border-gray-600">
                    </div>
                    <input type="number" id="filmCost" step="0.01" placeholder="Total cost ($)" class="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="rolls" placeholder="Rolls" class="border p-2 rounded dark:bg-gray-700 dark:border-gray-600">
                        <input type="number" id="exposures" placeholder="Exposures" class="border p-2 rounded dark:bg-gray-700 dark:border-gray-600">
                    </div>
                    <button id="saveFilmBtn" type="button" class="w-full bg-blue-600 text-white py-2 rounded font-medium hover:bg-blue-700">Save as Film Profile</button>
                </div>

                <div class="bg-green-50 dark:bg-green-900/20 p-4 rounded-lg space-y-3">
                    <h2 class="font-semibold text-green-800 dark:text-green-400 text-sm uppercase tracking-wide">Lab Setup</h2>
                    <input type="text" id="labName" class="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600" placeholder="Lab Name">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="devCost" placeholder="Dev" class="border p-2 rounded dark:bg-gray-700 dark:border-gray-600">
                        <input type="number" id="scanCost" placeholder="Scan" class="border p-2 rounded dark:bg-gray-700 dark:border-gray-600">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="printCost" placeholder="Print" class="border p-2 rounded dark:bg-gray-700 dark:border-gray-600">
                        <input type="number" id="pushPullCost" placeholder="P/P Fee" class="border p-2 rounded dark:bg-gray-700 dark:border-gray-600">
                    </div>
                    <select id="pushPullType" class="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600">
                        <option value="per_stop">Per Stop</option>
                        <option value="flat">Flat Fee</option>
                    </select>
                    <button id="saveLabBtn" type="button" class="w-full bg-green-600 text-white py-2 rounded font-medium hover:bg-green-700">Save as Lab Profile</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-orange-50 dark:bg-orange-900/20 p-4 rounded-lg space-y-2">
                    <h2 class="font-semibold text-orange-800 dark:text-orange-400 text-sm uppercase tracking-wide">Once-off Fee</h2>
                    <input type="number" id="onceOffFee" step="0.01" class="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600">
                </div>
                <div class="bg-yellow-50 dark:bg-yellow-900/20 p-4 rounded-lg space-y-2">
                    <h2 class="font-semibold text-yellow-800 dark:text-yellow-400 text-sm uppercase tracking-wide">Per-roll Fee</h2>
                    <input type="number" id="perRollFee" step="0.01" class="w-full border p-2 rounded dark:bg-gray-700 dark:border-gray-600">
                </div>
            </div>
        </form>

        <div class="mt-8 text-center bg-gray-50 dark:bg-gray-700/50 p-6 rounded-lg border border-gray-200 dark:border-gray-600">
            <div class="grid grid-cols-2 gap-8">
                <div><p class="text-sm text-gray-500 uppercase tracking-widest">Per Photo</p><div class="text-5xl font-bold text-gray-900 dark:text-white mt-2" id="costPerPhoto">--</div></div>
                <div><p class="text-sm text-gray-500 uppercase tracking-widest">Per Roll</p><div class="text-5xl font-bold text-gray-900 dark:text-white mt-2" id="costPerRoll">--</div></div>
            </div>
            <p class="text-sm text-gray-500 mt-6" id="breakdown">Please enter Film Cost & Developing Cost</p>

            <div class="mt-6 pt-6 border-t border-gray-200 dark:border-gray-600 text-left">
                <h3 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-3 text-center">Cheapest Lab For This Roll</h3>
                <div id="labComparison" class="space-y-1.5"></div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-gray-200 dark:border-gray-600">
                <button id="exportBtn" type="button" class="bg-gray-500 hover:bg-gray-600 text-white py-2 rounded">Export Data</button>
                <button id="importBtn" type="button" class="bg-gray-500 hover:bg-gray-600 text-white py-2 rounded">Import Data</button>
                <input type="file" id="importFile" class="hidden" accept=".json">
            </div>
        </div>

        <p class="mt-8 text-center text-xs text-gray-500 dark:text-gray-500">
            This project is "vibe coded" by Gemini. <br>
            Source code: <a href="https://github.com/trentnbauer/FilmCalc" class="underline hover:text-blue-500">github.com/trentnbauer/FilmCalc</a> 
        </p>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const lightIcon = document.getElementById('themeToggleLightIcon');
        const darkIcon = document.getElementById('themeToggleDarkIcon');

        function updateThemeIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            // Sun icon shows when in dark mode (click it to go light)
            lightIcon.classList.toggle('hidden', !isDark);
            // Moon icon shows when in light mode (click it to go dark)
            darkIcon.classList.toggle('hidden', isDark);
        }

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            updateThemeIcons();
        });

        updateThemeIcons();

        // ---------- Default profiles (loaded from films.yaml / labs.yml) ----------
        let defaultFilms = {};
        let defaultLabs = {};

        async function loadDefaults() {
            try {
                const [fRes, lRes] = await Promise.all([fetch('films.yaml'), fetch('labs.yml')]);
                if (fRes.ok) {
                    const parsed = jsyaml.load(await fRes.text()) || [];
                    parsed.forEach(f => { defaultFilms[f.name] = f; });
                }
                if (lRes.ok) {
                    const parsed = jsyaml.load(await lRes.text()) || [];
                    parsed.forEach(l => { defaultLabs[l.name] = l; });
                }
            } catch (e) {
                console.error('Error loading default profiles', e);
            } finally {
                updateFilmDropdown();
                updateLabDropdown();
            }
        }

        // ---------- Cost calculation ----------
        function calculateCost() {
            const filmCost = parseFloat(document.getElementById('filmCost').value) || 0;
            const devCost = parseFloat(document.getElementById('devCost').value) || 0;
            const rolls = parseInt(document.getElementById('rolls').value) || 1;
            const exposures = parseInt(document.getElementById('exposures').value) || 1;
            const boxSpeed = parseInt(document.getElementById('boxSpeed').value) || 0;
            const devSpeed = parseInt(document.getElementById('devSpeed').value) || 0;
            const scanCost = parseFloat(document.getElementById('scanCost').value) || 0;
            const printCost = parseFloat(document.getElementById('printCost').value) || 0;
            const onceOffFee = parseFloat(document.getElementById('onceOffFee').value) || 0;
            const perRollFee = parseFloat(document.getElementById('perRollFee').value) || 0;

            let activePushPullCost = 0;
            let pushPullText = "";

            if (boxSpeed > 0 && devSpeed > 0 && boxSpeed !== devSpeed) {
                const basePushPull = parseFloat(document.getElementById('pushPullCost').value) || 0;
                const pushPullType = document.getElementById('pushPullType').value;
                let stops = Math.round(Math.abs(Math.log2(devSpeed / boxSpeed)) * 10) / 10;
                activePushPullCost = (pushPullType === 'per_stop') ? (basePushPull * stops) : basePushPull;
                pushPullText = ` | ${devSpeed > boxSpeed ? "Pushed" : "Pulled"} ${stops} stop(s)`;
            }

            const labCostPerRoll = devCost + activePushPullCost + scanCost + printCost + perRollFee;
            const grandTotal = filmCost + (labCostPerRoll * rolls) + onceOffFee;
            const totalPhotos = exposures * rolls;

            document.getElementById('costPerPhoto').innerText = `$${(totalPhotos > 0 ? grandTotal / totalPhotos : 0).toFixed(2)}`;
            document.getElementById('costPerRoll').innerText = `$${(rolls > 0 ? grandTotal / rolls : 0).toFixed(2)}`;
            document.getElementById('breakdown').innerText = `Total Cost: $${grandTotal.toFixed(2)} | Photos: ${totalPhotos}${pushPullText}`;

            updateLabComparison();
        }

        // ---------- Cheapest lab comparison ----------
        // Compares every saved lab profile (built-in + custom) against the current
        // Box Speed / Dev Speed, since push/pull cost — not just base dev price —
        // can flip which lab is actually cheapest for a given roll.
        function updateLabComparison() {
            const boxSpeed = parseInt(document.getElementById('boxSpeed').value) || 0;
            const devSpeed = parseInt(document.getElementById('devSpeed').value) || 0;
            const container = document.getElementById('labComparison');

            const allLabs = { ...defaultLabs, ...JSON.parse(localStorage.getItem('labProfiles') || '{}') };
            const names = Object.keys(allLabs);

            if (names.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-400 text-center">Save a lab profile to compare prices</p>';
                return;
            }

            const results = names.map(name => {
                const lab = allLabs[name];
                const devCost = parseFloat(lab.devCost) || 0;
                const scanCost = parseFloat(lab.scanCost) || 0;
                const printCost = parseFloat(lab.printCost) || 0;
                const perRollFee = parseFloat(lab.perRollFee) || 0;
                const basePushPull = parseFloat(lab.pushPullCost) || 0;
                const pushPullType = lab.pushPullType || 'per_stop';

                let activePushPullCost = 0, stops = 0;
                if (boxSpeed > 0 && devSpeed > 0 && boxSpeed !== devSpeed) {
                    stops = Math.round(Math.abs(Math.log2(devSpeed / boxSpeed)) * 10) / 10;
                    activePushPullCost = (pushPullType === 'per_stop') ? (basePushPull * stops) : basePushPull;
                }

                const perRoll = devCost + activePushPullCost + scanCost + printCost + perRollFee;
                return { name, perRoll, stops };
            }).sort((a, b) => a.perRoll - b.perRoll);

            const currentLabName = document.getElementById('labName').value.trim();

            container.innerHTML = results.map((r, i) => {
                const isCheapest = i === 0;
                const isCurrent = r.name === currentLabName;
                const stopsLabel = r.stops > 0 ? ` <span class="text-xs text-gray-400">(${r.stops} stop push/pull)</span>` : '';
                return `<div class="flex justify-between items-center px-3 py-2 rounded-lg text-sm ${isCheapest ? 'bg-green-100 dark:bg-green-900/30' : 'bg-white dark:bg-gray-800/50'} ${isCurrent ? 'ring-2 ring-blue-400' : ''}">
                    <span class="${isCheapest ? 'font-semibold text-green-800 dark:text-green-400' : 'text-gray-700 dark:text-gray-300'}">${isCheapest ? '🏆 ' : ''}${r.name}${stopsLabel}</span>
                    <span class="font-mono ${isCheapest ? 'font-semibold text-green-800 dark:text-green-400' : 'text-gray-600 dark:text-gray-400'}">$${r.perRoll.toFixed(2)}/roll</span>
                </div>`;
            }).join('');
        }

        document.querySelectorAll('input, select').forEach(i => i.addEventListener('input', calculateCost));

        // Dev Speed defaults to Box Speed unless the user has explicitly typed a different value
        let devSpeedOverridden = false;
        const boxSpeedInput = document.getElementById('boxSpeed');
        const devSpeedInput = document.getElementById('devSpeed');
        devSpeedInput.addEventListener('input', () => { devSpeedOverridden = true; });
        boxSpeedInput.addEventListener('input', () => {
            if (!devSpeedOverridden) devSpeedInput.value = boxSpeedInput.value;
        });

        // ---------- Profile dropdowns ----------
        function updateDropdown(id, data, storageKey) {
            const dropdown = document.getElementById(id);
            const current = dropdown.value;
            const saved = JSON.parse(localStorage.getItem(storageKey) || '{}');
            const all = { ...data, ...saved };
            dropdown.innerHTML = '<option value="">-- Load profile --</option>';
            Object.keys(all).sort().forEach(n => dropdown.innerHTML += `<option value="${n}">${n}</option>`);
            if (all[current]) dropdown.value = current;
        }

        function updateFilmDropdown() { updateDropdown('savedFilmsDropdown', defaultFilms, 'filmProfiles'); }
        function updateLabDropdown() { updateDropdown('savedLabsDropdown', defaultLabs, 'labProfiles'); updateLabComparison(); }

        document.getElementById('savedFilmsDropdown').addEventListener('change', (e) => {
            const p = { ...defaultFilms, ...JSON.parse(localStorage.getItem('filmProfiles') || '{}') }[e.target.value];
            if (!p) return;
            document.getElementById('filmName').value = p.name;
            document.getElementById('boxSpeed').value = p.boxSpeed || '';
            document.getElementById('devSpeed').value = p.boxSpeed || '';
            devSpeedOverridden = false;
            document.getElementById('filmCost').value = p.filmCost || '';
            document.getElementById('rolls').value = p.rolls || '1';
            document.getElementById('exposures').value = p.exposures || '36';
            calculateCost();
        });

        document.getElementById('savedLabsDropdown').addEventListener('change', (e) => {
            const p = { ...defaultLabs, ...JSON.parse(localStorage.getItem('labProfiles') || '{}') }[e.target.value];
            if (!p) return;
            document.getElementById('labName').value = p.name;
            document.getElementById('devCost').value = p.devCost || 0;
            document.getElementById('scanCost').value = p.scanCost || 0;
            document.getElementById('printCost').value = p.printCost || 0;
            document.getElementById('pushPullCost').value = p.pushPullCost || 0;
            document.getElementById('pushPullType').value = p.pushPullType || 'per_stop';
            document.getElementById('onceOffFee').value = p.onceOffFee || 0;
            document.getElementById('perRollFee').value = p.perRollFee || 0;
            calculateCost();
        });

        // ---------- Save profiles ----------
        document.getElementById('saveFilmBtn').addEventListener('click', () => {
            const name = document.getElementById('filmName').value.trim();
            if (!name) return alert('Enter Film Name');
            let saved = JSON.parse(localStorage.getItem('filmProfiles') || '{}');
            saved[name] = {
                name,
                boxSpeed: document.getElementById('boxSpeed').value,
                filmCost: document.getElementById('filmCost').value,
                rolls: document.getElementById('rolls').value,
                exposures: document.getElementById('exposures').value
            };
            localStorage.setItem('filmProfiles', JSON.stringify(saved));
            updateFilmDropdown();
            document.getElementById('savedFilmsDropdown').value = name;
        });

        document.getElementById('saveLabBtn').addEventListener('click', () => {
            const name = document.getElementById('labName').value.trim();
            if (!name) return alert('Enter Lab Name');
            let saved = JSON.parse(localStorage.getItem('labProfiles') || '{}');
            saved[name] = {
                name,
                devCost: document.getElementById('devCost').value,
                scanCost: document.getElementById('scanCost').value,
                printCost: document.getElementById('printCost').value,
                pushPullCost: document.getElementById('pushPullCost').value,
                pushPullType: document.getElementById('pushPullType').value,
                onceOffFee: document.getElementById('onceOffFee').value,
                perRollFee: document.getElementById('perRollFee').value
            };
            localStorage.setItem('labProfiles', JSON.stringify(saved));
            updateLabDropdown();
            document.getElementById('savedLabsDropdown').value = name;
        });

        // ---------- Delete profiles ----------
        document.getElementById('deleteFilmBtn').addEventListener('click', () => {
            const dropdown = document.getElementById('savedFilmsDropdown');
            const name = dropdown.value;
            if (!name) return alert('Select a saved film to delete');
            if (defaultFilms[name] && !JSON.parse(localStorage.getItem('filmProfiles') || '{}')[name]) {
                return alert('Built-in film profiles can\'t be deleted, only custom saved ones.');
            }
            let saved = JSON.parse(localStorage.getItem('filmProfiles') || '{}');
            delete saved[name];
            localStorage.setItem('filmProfiles', JSON.stringify(saved));
            updateFilmDropdown();
        });

        document.getElementById('deleteLabBtn').addEventListener('click', () => {
            const dropdown = document.getElementById('savedLabsDropdown');
            const name = dropdown.value;
            if (!name) return alert('Select a saved lab to delete');
            if (defaultLabs[name] && !JSON.parse(localStorage.getItem('labProfiles') || '{}')[name]) {
                return alert('Built-in lab profiles can\'t be deleted, only custom saved ones.');
            }
            let saved = JSON.parse(localStorage.getItem('labProfiles') || '{}');
            delete saved[name];
            localStorage.setItem('labProfiles', JSON.stringify(saved));
            updateLabDropdown();
        });

        // ---------- Export / Import ----------
        document.getElementById('exportBtn').addEventListener('click', () => {
            const data = {
                films: JSON.parse(localStorage.getItem('filmProfiles') || '{}'),
                labs: JSON.parse(localStorage.getItem('labProfiles') || '{}')
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'calculator_data.json';
            a.click();
        });

        document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change', (e) => {
            if (!e.target.files.length) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    if (data.films) localStorage.setItem('filmProfiles', JSON.stringify(data.films));
                    if (data.labs) localStorage.setItem('labProfiles', JSON.stringify(data.labs));
                    updateFilmDropdown();
                    updateLabDropdown();
                    alert('Data imported!');
                } catch (err) {
                    alert('Could not read that file — is it a valid export from this app?');
                }
            };
            reader.readAsText(e.target.files[0]);
            e.target.value = '';
        });

        loadDefaults();
    </script>
</body>
</html>
