<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Cost Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', }
    </script>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 font-sans min-h-screen flex items-center justify-center p-4 transition-colors duration-200">

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 md:p-8 max-w-md w-full relative transition-colors duration-200">
        
        <button id="themeToggle" class="absolute top-6 right-6 p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500" aria-label="Toggle Dark Mode">
            <svg id="themeToggleLightIcon" class="hidden w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 3.22a1 1 0 011.415 0l.708.708a1 1 0 01-1.414 1.414l-.708-.708a1 1 0 010-1.414zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM14.22 15.78a1 1 0 010 1.415l-.708.708a1 1 0 01-1.414-1.414l-.708-.708a1 1 0 011.415 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-3.22a1 1 0 01-1.415 0l-.708-.708a1 1 0 011.414-1.414l-.708.708a1 1 0 010 1.415zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1zm3.22-4.22a1 1 0 010-1.415l.708-.708a1 1 0 011.414 1.414l-.708.708a1 1 0 01-1.415 0zM10 5a5 5 0 100 10 5 5 0 000-10z" clip-rule="evenodd"></path></svg>
            <svg id="themeToggleDarkIcon" class="hidden w-5 h-5 text-gray-700" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        </button>

        <h1 class="text-2xl font-bold text-center mb-6 text-gray-900 dark:text-white pr-8">Film Cost Calculator</h1>
        
        <form id="calculatorForm" class="space-y-4">
            
            <div class="bg-purple-50 dark:bg-purple-900/20 p-4 rounded-lg border border-purple-100 dark:border-purple-800/30">
                <label class="block text-sm font-semibold text-purple-800 dark:text-purple-400 mb-2 uppercase tracking-wide">Load Saved Film</label>
                <div class="flex gap-2">
                    <select id="savedFilmsDropdown" class="flex-1 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-purple-500 outline-none transition-colors">
                        <option value="">-- Loading films... --</option>
                    </select>
                    <button id="deleteFilmBtn" type="button" class="bg-red-500 hover:bg-red-600 text-white px-3 py-2 rounded shadow transition-colors font-bold">✕</button>
                </div>
            </div>

            <div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-lg space-y-3 transition-colors duration-200">
                <h2 class="font-semibold text-blue-800 dark:text-blue-400 text-sm uppercase tracking-wide">The Film</h2>
                
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">Film Name</label>
                    <input type="text" id="filmName" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" placeholder="e.g. Kodak Portra 400">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Box Speed</label>
                        <input type="number" id="boxSpeed" min="1" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" placeholder="400">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Dev Speed</label>
                        <input type="number" id="devSpeed" min="1" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" placeholder="400">
                    </div>
                </div>
                <p class="text-xs text-gray-500 -mt-2">(leave Dev Speed same as box if unsure)</p>

                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">Total cost of film pack (incl. postage)</label>
                    <input type="number" id="filmCost" step="0.01" min="0" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" placeholder="0.00" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Rolls in pack</label>
                        <input type="number" id="rolls" min="1" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" value="1" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Exposures/Roll</label>
                        <input type="number" id="exposures" min="1" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" value="36" required>
                    </div>
                </div>

                <div class="pt-4 mt-4 border-t border-blue-200 dark:border-blue-800 flex justify-end">
                    <button id="saveFilmBtn" type="button" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded shadow transition-colors font-medium">Save Profile</button>
                </div>
            </div>

            <div class="bg-teal-50 dark:bg-teal-900/20 p-4 rounded-lg border border-teal-100 dark:border-teal-800/30">
                <label class="block text-sm font-semibold text-teal-800 dark:text-teal-400 mb-2 uppercase tracking-wide">Load Saved Lab</label>
                <div class="flex gap-2">
                    <select id="savedLabsDropdown" class="flex-1 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-teal-500 outline-none transition-colors">
                        <option value="">-- Load a saved lab --</option>
                    </select>
                    <button id="deleteLabBtn" type="button" class="bg-red-500 hover:bg-red-600 text-white px-3 py-2 rounded shadow transition-colors font-bold">✕</button>
                </div>
            </div>

            <div class="bg-green-50 dark:bg-green-900/20 p-4 rounded-lg space-y-3 transition-colors duration-200">
                <h2 class="font-semibold text-green-800 dark:text-green-400 text-sm uppercase tracking-wide">Lab Costs (Per Roll)</h2>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">Lab Name</label>
                    <input type="text" id="labName" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-green-500 outline-none transition-colors" placeholder="e.g. Local Pharmacy">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Developing</label>
                        <input type="number" id="devCost" step="0.01" min="0" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-green-500 outline-none transition-colors" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Scanning</label>
                        <input type="number" id="scanCost" step="0.01" min="0" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-green-500 outline-none transition-colors" value="0">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Printing</label>
                        <input type="number" id="printCost" step="0.01" min="0" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-green-500 outline-none transition-colors" value="0">
                    </div>
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Push / Pull Fee</label>
                        <div class="flex gap-2">
                            <input type="number" id="pushPullCost" step="0.01" min="0" class="w-1/2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-green-500 outline-none transition-colors" value="0">
                            <select id="pushPullType" class="w-1/2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-green-500 outline-none transition-colors">
                                <option value="per_stop" selected>Per Stop</option>
                                <option value="flat">Flat Fee</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="pt-4 mt-4 border-t border-green-200 dark:border-green-800 flex justify-end">
                    <button id="saveLabBtn" type="button" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded shadow transition-colors font-medium">Save Profile</button>
                </div>
            </div>

            <div class="bg-orange-50 dark:bg-orange-900/20 p-4 rounded-lg space-y-3 transition-colors duration-200">
                <h2 class="font-semibold text-orange-800 dark:text-orange-400 text-sm uppercase tracking-wide">Additional Fees</h2>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">Once-off Fee</label>
                    <input type="number" id="onceOffFee" step="0.01" min="0" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded p-2 focus:ring-2 focus:ring-orange-500 outline-none transition-colors" value="0">
                </div>
            </div>
        </form>

        <div class="mt-8 text-center bg-gray-50 dark:bg-gray-700/50 p-4 rounded-lg border border-gray-200 dark:border-gray-600 transition-colors duration-200">
            <div class="grid grid-cols-2 gap-4 my-2">
                <div>
                    <p class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Per Photo</p>
                    <div class="text-4xl font-bold text-gray-900 dark:text-white" id="costPerPhoto">--</div>
                </div>
                <div>
                    <p class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Per Roll</p>
                    <div class="text-4xl font-bold text-gray-900 dark:text-white" id="costPerRoll">--</div>
                </div>
            </div>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-4 pt-4 border-t border-gray-200 dark:border-gray-600" id="breakdown">Please enter Film Cost & Developing Cost</p>
        </div>

        <p class="mt-8 text-center text-xs text-gray-400 dark:text-gray-600">
            Vibe coded by Gemini | <a href="https://trentbauer.com" class="hover:text-blue-500 underline transition-colors">trentbauer.com</a>
        </p>
    </div>

    <script>
        // --- State ---
        let defaultFilms = {};

        // --- CSV Loader ---
        async function loadCSV() {
            try {
                const response = await fetch('films.csv');
                if (!response.ok) throw new Error("Could not fetch CSV");
                const csvText = await response.text();
                const lines = csvText.split('\n');
                const headers = lines[0].split(',').map(h => h.trim());
                
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue; 
                    const values = lines[i].split(',');
                    const film = {};
                    for (let j = 0; j < headers.length; j++) {
                        let val = values[j] ? values[j].trim() : '';
                        if (headers[j] !== 'name') val = parseFloat(val) || 0; 
                        film[headers[j]] = val;
                    }
                    if (film.name) defaultFilms[film.name] = film;
                }
            } catch (error) { console.error("CSV Load Error:", error); } 
            finally { updateFilmDropdown(); }
        }

        // --- Calculator ---
        function calculateCost() {
            const filmCost = parseFloat(document.getElementById('filmCost').value);
            const devCost = parseFloat(document.getElementById('devCost').value);
            
            if (isNaN(filmCost) || isNaN(devCost)) {
                document.getElementById('costPerPhoto').innerText = "--";
                document.getElementById('costPerRoll').innerText = "--";
                document.getElementById('breakdown').innerText = "Please enter Film Cost & Developing Cost";
                return;
            }

            const rolls = parseInt(document.getElementById('rolls').value) || 1;
            const exposures = parseInt(document.getElementById('exposures').value) || 1;
            const boxSpeed = parseInt(document.getElementById('boxSpeed').value) || 0;
            const devSpeed = parseInt(document.getElementById('devSpeed').value) || 0;
            const scanCost = parseFloat(document.getElementById('scanCost').value) || 0;
            const printCost = parseFloat(document.getElementById('printCost').value) || 0;
            const onceOffFee = parseFloat(document.getElementById('onceOffFee').value) || 0;
            
            let activePushPullCost = 0;
            let pushPullText = "";

            if (boxSpeed > 0 && devSpeed > 0 && boxSpeed !== devSpeed) {
                const basePushPull = parseFloat(document.getElementById('pushPullCost').value) || 0;
                const pushPullType = document.getElementById('pushPullType').value;
                let stops = Math.round(Math.abs(Math.log2(devSpeed / boxSpeed)) * 10) / 10; 
                activePushPullCost = (pushPullType === 'per_stop') ? (basePushPull * stops) : basePushPull;
                pushPullText = ` | ${devSpeed > boxSpeed ? "Pushed" : "Pulled"} ${stops} stop(s)`;
            }

            const grandTotal = filmCost + ((devCost + activePushPullCost + scanCost + printCost) * rolls) + onceOffFee;
            const totalPhotos = exposures * rolls;
            
            document.getElementById('costPerPhoto').innerText = `$${(totalPhotos > 0 ? grandTotal / totalPhotos : 0).toFixed(2)}`;
            document.getElementById('costPerRoll').innerText = `$${(rolls > 0 ? grandTotal / rolls : 0).toFixed(2)}`;
            document.getElementById('breakdown').innerText = `Total Cost: $${grandTotal.toFixed(2)} | Photos: ${totalPhotos}${pushPullText}`;
        }

        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(i => { i.addEventListener('input', calculateCost); i.addEventListener('change', calculateCost); });

        // --- Auto-fill Speed ---
        const boxSpeedInput = document.getElementById('boxSpeed');
        const devSpeedInput = document.getElementById('devSpeed');
        let devSpeedManuallyEdited = false;
        devSpeedInput.addEventListener('input', () => devSpeedManuallyEdited = true);
        boxSpeedInput.addEventListener('input', () => { if (!devSpeedManuallyEdited) devSpeedInput.value = boxSpeedInput.value; calculateCost(); });

        // --- Logic ---
        function updateFilmDropdown() {
            const dropdown = document.getElementById('savedFilmsDropdown');
            dropdown.innerHTML = '<option value="">-- Load a saved film --</option>';
            const films = { ...defaultFilms, ...JSON.parse(localStorage.getItem('filmProfiles') || '{}') };
            Object.keys(films).sort().forEach(name => {
                const opt = document.createElement('option'); opt.value = name; opt.textContent = name; dropdown.appendChild(opt);
            });
        }

        function saveFilmProfile() {
            const name = document.getElementById('filmName').value.trim();
            if (!name) return alert("Enter Film Name");
            let saved = JSON.parse(localStorage.getItem('filmProfiles') || '{}');
            saved[name] = { name, boxSpeed: boxSpeedInput.value, filmCost: document.getElementById('filmCost').value, rolls: document.getElementById('rolls').value, exposures: document.getElementById('exposures').value };
            localStorage.setItem('filmProfiles', JSON.stringify(saved));
            updateFilmDropdown();
        }

        function loadFilmProfile(e) {
            const profile = { ...defaultFilms, ...JSON.parse(localStorage.getItem('filmProfiles') || '{}') }[e.target.value];
            if (!profile) return;
            devSpeedManuallyEdited = false;
            document.getElementById('filmName').value = profile.name;
            document.getElementById('boxSpeed').value = profile.boxSpeed || '';
            document.getElementById('devSpeed').value = profile.boxSpeed || '';
            document.getElementById('filmCost').value = profile.filmCost || '';
            document.getElementById('rolls').value = profile.rolls || '1';
            document.getElementById('exposures').value = profile.exposures || '36';
            calculateCost();
        }

        function deleteFilmProfile() {
            let saved = JSON.parse(localStorage.getItem('filmProfiles') || '{}');
            const name = document.getElementById('filmName').value.trim();
            if (saved[name]) { delete saved[name]; localStorage.setItem('filmProfiles', JSON.stringify(saved)); updateFilmDropdown(); }
        }

        function updateLabDropdown() {
            const dropdown = document.getElementById('savedLabsDropdown');
            dropdown.innerHTML = '<option value="">-- Load a saved lab --</option>';
            const labs = JSON.parse(localStorage.getItem('labProfiles') || '{}');
            Object.keys(labs).sort().forEach(name => { const opt = document.createElement('option'); opt.value = name; opt.textContent = name; dropdown.appendChild(opt); });
        }

        function saveLabProfile() {
            const name = document.getElementById('labName').value.trim();
            if (!name) return alert("Enter Lab Name");
            let saved = JSON.parse(localStorage.getItem('labProfiles') || '{}');
            saved[name] = { name, devCost: document.getElementById('devCost').value, pushPullCost: document.getElementById('pushPullCost').value, pushPullType: document.getElementById('pushPullType').value, scanCost: document.getElementById('scanCost').value, printCost: document.getElementById('printCost').value, onceOffFee: document.getElementById('onceOffFee').value };
            localStorage.setItem('labProfiles', JSON.stringify(saved));
            updateLabDropdown();
        }

        function loadLabProfile(e) {
            const profile = JSON.parse(localStorage.getItem('labProfiles') || '{}')[e.target.value];
            if (!profile) return;
            document.getElementById('labName').value = profile.name;
            document.getElementById('devCost').value = profile.devCost;
            document.getElementById('pushPullCost').value = profile.pushPullCost;
            document.getElementById('pushPullType').value = profile.pushPullType;
            document.getElementById('scanCost').value = profile.scanCost;
            document.getElementById('printCost').value = profile.printCost;
            document.getElementById('onceOffFee').value = profile.onceOffFee;
            calculateCost();
        }

        function deleteLabProfile() {
            let saved = JSON.parse(localStorage.getItem('labProfiles') || '{}');
            const name = document.getElementById('labName').value.trim();
            if (saved[name]) { delete saved[name]; localStorage.setItem('labProfiles', JSON.stringify(saved)); updateLabDropdown(); }
        }

        document.getElementById('saveFilmBtn').addEventListener('click', saveFilmProfile);
        document.getElementById('deleteFilmBtn').addEventListener('click', deleteFilmProfile);
        document.getElementById('savedFilmsDropdown').addEventListener('change', loadFilmProfile);
        document.getElementById('saveLabBtn').addEventListener('click', saveLabProfile);
        document.getElementById('deleteLabBtn').addEventListener('click', deleteLabProfile);
        document.getElementById('savedLabsDropdown').addEventListener('change', loadLabProfile);

        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });

        loadCSV();
        updateLabDropdown();
    </script>
</body>
</html>
